  {"front": "Návrh konkrétních technik pro případ 15 (bezpečné → hlubší)?", "back": "Progrese: haptika/uvolnění → volná barevná stopa → „MOJE BEZPEČNÉ MÍSTO“ → modelování pocitů → příběh ve více obrazech. Hnětení/trhání = ventil napětí místo sebepoškozování; „bezpečné místo“ = pocit bezpečí a kontroly; modelování = haptika i přes omezení DK; skupina až po stabilizaci.", "pripad": 15, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Co je projekce v arteterapii a jak ji u týraného dítěte využít bezpečně?", "back": "PROJEKCE = promítnutí vnitřního stavu (strach, hněv, vina) do díla; základ arteterapeutické DIAGNOSTIKY. U traumatu interpretovat OPATRNĚ a NEDIREKTIVNĚ — nevyvolávat, nenutit do výkladu; obraz nese tolik, kolik unese dítě. Riziko re-traumatizace při tlaku na interpretaci.", "pripad": 15, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; opatrnost klinicky Vágnerová STR. 182"},
  {"front": "Případ 15 vs. 23 — jak se liší arteterapeutický plán? (zkušební past)", "back": "Stejná vada (rozštěp páteře), JINÉ jádro. 15 = chlapec 15 let + TÝRÁNÍ (CAN) → arteterapie hlavně jako bezpečný kanál pro trauma, obnova důvěry, pozor na re-traumatizaci. 23 = žena 30 let, závislost na matce → arteterapie pro AUTONOMII a aktérství (vlastní hlas, separace). Trauma × závislost = jiný cíl.", "pripad": 15, "obor": "klientská skupina", "tema": "srovnání 15 × 23", "zdroj": "klinicky Vágnerová STR. 70, 181–183; arte ⚠️ ověřit"},
  {"front": "Případ 16 (dětský autismus F84.0 + smíšená porucha řeči, dívka 10 let): čím se arteterapie liší od Aspergera?", "back": "Řeč chybí/je echolalická a NENÍ používána ke komunikaci → těžiště je NEVERBÁLNÍ kanál: vizuální struktura/rozvrh, PIKTOGRAMY, senzomotorika a NÁPODOBA, rituál. U Aspergera (případ 2) se naopak hodně pracuje se symbolem, reflexí a emoční gramotností. Reflektivní dialog je tu minimální.", "pripad": 16, "obor": "arteterapie", "tema": "definice", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.86"},
  {"front": "Případ 16: proč právě arteterapie a na co hlavně cílí? (bio·psycho·sociál)", "back": "Nabízí NEVERBÁLNÍ kanál tam, kde řeč selhává (echolálie). BIO: senzomotorika a kanál pro psychomotorický NEKLID, ale POZOR na přecitlivělost (zvuky, textury). PSYCHO: sebevyjádření bez slov a ventil afektu (afekt = primitivní komunikace). SOCIÁL: neverbální kontakt skrze nápodobu (nevytvoří hluboký vztah). POZOR: arteterapie NELÉČÍ autismus.", "pripad": 16, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.84, 85–86"},
  {"front": "Jak vést arteterapii u dětského autismu — čím se vyznačuje?", "back": "NEVERBÁLNÍ kanál (dílo, piktogramy, výměnné karty). VIZUÁLNÍ STRUKTURA a rozvrh (jasný začátek a konec činnosti). SENZOMOTORIKA a NÁPODOBA (terapeut předvede, dítě opakuje), ne abstraktní symbol. OPAKOVÁNÍ a RITUÁL (nezatěžuje). OPATRNĚ se senzorickou přecitlivělostí. Odměna materiální, ne sociální pochvala.", "pripad": 16, "obor": "arteterapie", "tema": "principy u autismu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.85–87"},
  {"front": "Případ 16: jak řešit OMEZENOU ŘEČ a komunikaci v arteterapii?", "back": "Řeč je echolalická a není komunikací → nevést sezení mluveným slovem. Komunikovat přes DÍLO + PIKTOGRAMY a VÝMĚNNÉ/obrázkové KARTY (vazba na logopedii a AAK). Párovat obraz ↔ piktogram. Sdílení neverbální. Cíl = funkční neverbální komunikace, ne korekce echolálie.", "pripad": 16, "obor": "arteterapie-technika", "tema": "neverbální komunikace", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; řeč mimo komunikaci Vágnerová STR.86"},
  {"front": "Případ 16: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ, převážně INDIVIDUÁLNÍ, nedirektivní, proces-orientovaná, SILNĚ STRUKTUROVANÁ s opakováním, NEVERBÁLNÍ a SENZOMOTORICKÁ. Cíle: neverbální sebevyjádření a komunikace, regulace napětí a neklidu, smyslový prožitek, jemná motorika. Skupina jen okrajově (nevytvoří vztahy).", "pripad": 16, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.85–87"},
  {"front": "Případ 16: čeho se v arteterapii VYVAROVAT?", "back": "Nespoléhat na mluvenou instrukci a netlačit na verbální interpretaci (vést vizuálně a nápodobou). NEMĚNIT náhle rituál, materiál, místo ani terapeuta (změna dezorientuje → afekt). Nepřetěžovat SENZORICKY (lepkavé/studené/hlučné materiály). Sebepoškozování = obrana, ne zlobení. Nečekat motivaci sociální pochvalou.", "pripad": 16, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.85–86"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u dětského autismu?", "back": "1 Vizuální rozvrh (piktogram) → 2 Haptická rozcvička → 3 Tvorba NÁPODOBOU → 4 Neverbální sdílení → 5 Konkrétní odměna (↺). Stejné pořadí, místo, materiál i terapeut; vedeno OBRÁZKEM a nápodobou, ne mluveným slovem; odměna materiální/strukturovaná.", "pripad": 16, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; stálost a odměna klinicky Vágnerová STR.85–87"},
  {"front": "Návrh konkrétních technik pro případ 16 (od jednodušších po náročnější)?", "back": "Progrese: otisky/haptika → volná stopa (nápodoba) → jednoduchá malba → modelování → párování obraz ↔ piktogram. Otisky a prstové barvy = senzomotorika a uvolnění neklidu; modelování = jemná motorika (pozor na texturu); párování obraz↔piktogram = funkční neverbální komunikace (AAK).", "pripad": 16, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit; rámec Vágnerová STR.85–86"},
  {"front": "Případ 16: co je projekce a jak ji u dětského autismu interpretovat?", "back": "PROJEKCE = promítnutí vnitřního stavu do díla; základ arteterapeutické DIAGNOSTIKY. U dětského autismu interpretovat VELMI ZDRŽENLIVĚ — nepřeceňovat symboliku, dílo je spíš senzomotorický prožitek a stopa než vědomé sdělení. Pozorovat radši napětí, neklid a afekt jako neverbální signály.", "pripad": 16, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.86"},
  {"front": "Případ 17 (roztroušená skleróza, 60 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "Nabízí NEVERBÁLNÍ kanál tam, kde je řeč špatně srozumitelná (dysartrie), a prostor pro ZPRACOVÁNÍ ZTRÁTY u progresivního onemocnění. BIO: šetrná senzomotorika, ale POZOR na ÚNAVU. PSYCHO: ventil zlosti/úzkosti ze ztráty, zážitek úspěchu proti nízkému sebevědomí. SOCIÁL: kontakt bez tlaku na výslovnost, skupina lidí s RS. POZOR: arteterapie NELÉČÍ RS (onemocnění CNS) — je podpůrná.", "pripad": 17, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.54, 70–71"},
  {"front": "Případ 17: jak v arteterapii zohlednit ÚNAVU (fatigue) u RS?", "back": "Únava je JÁDROVÝ příznak RS → KRÁTKÉ jednotky, ŠETŘIT energií, střídat tvorbu a odpočinek. Při velké únavě nabídnout RECEPTIVNÍ formu (vnímání hotového díla) místo náročné vlastní tvorby. Nepřetěžovat — dlouhá sezení zhoršují výkon i náladu.", "pripad": 17, "obor": "arteterapie", "tema": "únava / šetřící režim", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.70–71"},
  {"front": "Případ 17: jak vést arteterapii u PROGRESIVNÍHO a kolísavého onemocnění?", "back": "Cíl sezení se PRUŽNĚ přizpůsobuje aktuálnímu stavu (lepší/horší dny), ne fixně. Tvorba jako prostor pro ADAPTACI na zhoršování a přijetí změněné identity (získané postižení → nová, méně uspokojivá identita). Proces > produkt, podpora autonomie a sebevědomí.", "pripad": 17, "obor": "arteterapie", "tema": "principy u progresivní nemoci", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.54, 70–71"},
  {"front": "Případ 17: jak v arteterapii obejít DYSARTRII (neverbální kanál)?", "back": "Dysartrie = porucha VÝSLOVNOSTI při zachovaném jazyku a porozumění (≠ afázie, kde vázne sám jazyk). Komunikace přes DÍLO, gesta, obrázkové/AAK karty; dostatek času na sdílení. Netlačit na rychlou srozumitelnou řeč ani nejednat „přes hlavu”. Propojit s logopedií/AAK.", "pripad": 17, "obor": "arteterapie", "tema": "neverbální komunikace", "zdroj": "arte Slavík ⚠️ ověřit; klinicky Vágnerová STR.49, 70"},
  {"front": "Případ 17: které dělení arteterapie zvolit a proč i receptivní?", "back": "Převážně PRODUKTIVNÍ (vlastní tvorba), individuální i SKUPINOVÁ. Kvůli ÚNAVĚ ale střídat s RECEPTIVNÍ formou (vnímání díla — šetří energii). V terapii arteterapie (zpracování ztráty), ve stacionáři lze i artefiletický přesah. Skupina lidí s RS → sdílení a efekt similarity.", "pripad": 17, "obor": "arteterapie", "tema": "dělení", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.53, 70"},
  {"front": "Případ 17: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ s receptivními vstupy (únava), individuální i skupinová, NEDIREKTIVNÍ, PROCES-orientovaná, v ŠETŘÍCÍM režimu (krátké jednotky, pružnost). Cíle: neverbální sebevyjádření, zpracování ztráty a adaptace na zhoršování, zážitek úspěchu proti nízkému sebevědomí, podpora autonomie.", "pripad": 17, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.54, 70–71"},
  {"front": "Případ 17: čeho se v arteterapii VYVAROVAT?", "back": "Nepřetěžovat (únava, kolísavý stav). Netlačit na rychlou srozumitelnou řeč ani nejednat „přes hlavu” (nabídnout obraz/AAK). Neignorovat kolísavost — cíle ne fixní. Nehodnotit dílo esteticky a nesrovnávat. Negeneralizovat klientku jako „úplně závislou” — podporovat zachované kompetence a autonomii.", "pripad": 17, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.49, 70–71"},
  {"front": "Návrh: jak vypadá cyklus arteterapeutického sezení u RS (šetřící režim)?", "back": "1 Krátké naladění → 2 Lehká haptická rozcvička → 3 Vlastní tvorba (krátká) → 4 Odpočinek + neverbální sdílení → 5 Ocenění procesu a přizpůsobení stavu (↺). Krátké kroky se střídáním ODPOČINKU; cíl se přizpůsobuje aktuální únavě a kolísání.", "pripad": 17, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; šetření energií klinicky Vágnerová STR.70–71"},
  {"front": "Návrh konkrétních technik pro případ 17 (šetrné → náročnější)?", "back": "Progrese: receptivní vnímání díla → otisky/haptika → volná stopa/čmárání → jednoduchá malba → tematická tvorba o cestě/ztrátě. Receptivní vnímání = prožitek bez zátěže (únava); malba nálady = ventil emocí ze ztráty; „má cesta”/čára života = zpracování ztráty a změněné identity; skupina lidí s RS = sdílení a similarita.", "pripad": 17, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Co je projekce v arteterapii a jak ji u případu 17 využít?", "back": "PROJEKCE = promítnutí vnitřního stavu (hořkosti, úzkosti ze ztráty) do díla; základ arteterapeutické DIAGNOSTIKY. U RS slouží k bezpečnému vyjádření emocí kolem progrese a přijetí změněné identity. Interpretovat citlivě, s dostatkem času (dysartrie) a bez tlaku.", "pripad": 17, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.54, 71"},
  {"front": "Případ 18 (nízkofunkční autismus F84.0 + narušené sluchové vnímání, chlapec 10 let): čím se arteterapie liší od ostatních PAS?", "back": "Nejnižší funkční úroveň (rozumí pár slovům, často + MR) → arteterapie = především BAZÁLNÍ STIMULACE a SENZOMOTORIKA: „tvorba jako prožitek, NE produkt”, materiál jako regulace napětí, MINIMUM ABSTRAKCE. Žádný symbol, příběh ani reflexe (na rozdíl od Aspergera). Vést hapticky/vizuálně, ne zvukem.", "pripad": 18, "obor": "arteterapie", "tema": "definice", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; úroveň klinicky Vágnerová STR.86"},
  {"front": "Případ 18: proč právě arteterapie a na co hlavně cílí? (bio·psycho·sociál)", "back": "BIO: bazální a senzomotorická stimulace (dotek, tlak, teplo, stopa) — POZOR, sluch je periferně OK, porucha je centrální (dysgnózie) → vést hapticky/vizuálně, ne zvukem. PSYCHO: materiál jako REGULACE NAPĚTÍ a bezpečí. SOCIÁL: neverbální kontakt s jednou stálou osobou (nevytvoří hluboký vztah). POZOR: arteterapie NELÉČÍ autismus ani MR.", "pripad": 18, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.84, 85–86"},
  {"front": "Jak vést arteterapii u nízkofunkčního autismu — čím se vyznačuje?", "back": "BAZÁLNÍ STIMULACE a senzomotorika (dotek, tlak, stopa). MINIMUM ABSTRAKCE — jen materiál a smyslový zážitek. JEDNODUCHÉ OPAKUJÍCÍ SE činnosti a neměnný rituál. Vedení HAPTICKÉ a VIZUÁLNÍ + fyzická dopomoc (ne zvuk/slovo — dysgnózie). Struktura a bezpečí, snížení smyslové zátěže. Materiální odměna.", "pripad": 18, "obor": "arteterapie", "tema": "principy u nízkofunkčního autismu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.85–87"},
  {"front": "Případ 18: jak v arteterapii řešit NARUŠENÉ SLUCHOVÉ VNÍMÁNÍ (dysgnózii)?", "back": "Není to hluchota — slyší a diferencuje zvuky, ale neodlišuje ŘEČ a nedekóduje význam (centrální zpracování). Proto NEVÉST sezení zvukem ani mluveným slovem; vést VIZUÁLNĚ a HAPTICKY (předmět, ukázka, fyzická dopomoc). Pozor i na muzikoterapii a hlasité podněty (přecitlivělost).", "pripad": 18, "obor": "arteterapie-technika", "tema": "dysgnózie / vedení bez zvuku", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; dysgnózie klinicky Vágnerová STR.85"},
  {"front": "Případ 18: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ na BAZÁLNÍ/senzomotorické úrovni, INDIVIDUÁLNÍ (1:1), nedirektivní, proces-orientovaná (prožitek, ne produkt), SILNĚ STRUKTUROVANÁ a neměnná, vedená hapticky/vizuálně. Cíle: smyslový prožitek a kontakt, regulace napětí materiálem, jemná motorika, bezpečí. Skupina není funkční.", "pripad": 18, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; cíle klinicky Vágnerová STR.85–87"},
  {"front": "Případ 18: čeho se v arteterapii VYVAROVAT?", "back": "Nepožadovat symbol, příběh ani reflexi (úroveň to neunese). Nezaměnit za periferní hluchotu a nevést zvukem (dysgnózie — zesílení zvuku nepomůže). Nehodnotit „dílo” esteticky (jde o prožitek). Neměnit náhle místo/pořadí/materiál/osobu. Nepřetěžovat senzoricky. Sebepoškozování = obrana, ne zlobení. Sociální pochvala nemotivuje.", "pripad": 18, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.85–86"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u nízkofunkčního autismu?", "back": "1 Stálé naladění (předmět) → 2 Bazální stimulace (dotek) → 3 Smyslová tvorba (hmota) → 4 Společné dotvoření → 5 Konkrétní odměna (↺). Stejné místo, pořadí, materiál i osoba; vedeno HAPTICKY a VIZUÁLNĚ (ne zvukem); cílem je PROŽITEK, ne produkt; odměna materiální.", "pripad": 18, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Šicková-Fabrici/Liebmann ⚠️ ověřit; stálost a odměna klinicky Vágnerová STR.85–87"},
  {"front": "Návrh konkrétních technik pro případ 18 (od jednodušších po náročnější)?", "back": "Progrese: dotek/tlak (bazální) → stopa v hmotě (písek, krém, pěna) → otisky/prstové barvy → mačkání/modelování hlíny → jednoduchá barevná plocha. Bazální stimulace = vnímání těla a kontakt; stopa v hmotě a hlína = regulace napětí; vše bez nároku na zobrazení. Pozor na texturu (přecitlivělost).", "pripad": 18, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici ⚠️ ověřit; přecitlivělost Vágnerová STR.85"},
  {"front": "Případ 18 vs. 16 vs. 2 — proč stejná diagnóza ‚spektrum', a přesto jiný arteterapeutický plán?", "back": "Liší se FUNKČNÍ ÚROVEŇ. 18 (nízkofunkční + dysgnózie) → BAZÁLNÍ stimulace, materiál jako regulace, minimum abstrakce, bez zvuku. 16 (dětský autismus + porucha řeči) → neverbální kanál, piktogramy, senzomotorika a nápodoba. 2 (Asperger, vysokofunkční) → symbol, reflexe, emoční gramotnost. Plán = podle úrovně, ne podle názvu diagnózy.", "pripad": 18, "obor": "klientská skupina", "tema": "srovnání napříč PAS", "zdroj": "klinicky Vágnerová STR.85–87; arte ⚠️ ověřit"},
  {"front": "Případ 19 (lehká MR F70, 34 let, šikanován): čím se arteterapie liší od těžších stupňů MR?", "back": "Vyšší kognitivní úroveň (konkrétní logika, ≈ školák) → VÍCE PROSTORU PRO SYMBOL, PŘÍBĚH v obraze a REFLEKTIVNÍ DIALOG nad dílem (posun k artefiletice). Stále konkrétně, bez abstrakce. U středně těžké MR/Downa se naopak zůstává hlavně na senzomotorické a neverbální úrovni.", "pripad": 19, "obor": "artefiletika", "tema": "definice", "zdroj": "arte Slavík/Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.78"},
  {"front": "Případ 19: proč arteterapie a na co hlavně cílí? (bio·psycho·sociál)", "back": "BIO: jemná motorika a uvolnění úzkosti (motorika u F70 zvládnutá → unese náročnější techniky). PSYCHO: zpracování zážitku ŠIKANY a obnova SEBEPOJETÍ/sebevědomí. SOCIÁL: bezpečný nácvik KONTAKTU (potíže v kontaktu po šikaně). POZOR: arteterapie neléčí MR; šikana NENÍ příčina MR, ale sociální důsledek.", "pripad": 19, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.78, 81, 155"},
  {"front": "Jak vést arteterapii u lehké MR (F70) — čím se vyznačuje?", "back": "Proces > produkt. Více SYMBOLU a jednoduché REFLEXE nad dílem (artefiletika). PŘÍBĚH v obrázcích ke zpracování zážitku. Budování SEBEPOJETÍ („kdo jsem, co umím”). Reflexe v KRÁTKÝCH větách, bez ironie a metafor (respekt k vadě řeči). Bezpečí a postupnost: nejdřív individuálně, pak malá důvěryhodná skupina.", "pripad": 19, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Slavík/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.80, 81, 155"},
  {"front": "Případ 19: jak v arteterapii zpracovat ŠIKANU a posílit sebevědomí?", "back": "PŘÍBĚH v obrázcích (sekvence) = bezpečné zpracování zážitku. AUTOPORTRÉT / „kdo jsem, co umím” = budování sebepojetí. Zážitek úspěchu + pochvala procesu = náprava sebehodnocení. Po šikaně NETLAČIT do kontaktu silou — důvěru budovat postupně, individuálně → malá skupina.", "pripad": 19, "obor": "arteterapie", "tema": "sebepojetí po šikaně", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.81, 155"},
  {"front": "Případ 19: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ tvorba s ARTEFILETICKÝM přesahem (zážitek + reflexe), nejdřív INDIVIDUÁLNĚ, pak malá bezpečná SKUPINA, nedirektivní, proces-orientovaná. Cíle: zpracování šikany, obnova sebepojetí a sebevědomí, nácvik kontaktu, sebevyjádření při respektu k vadě řeči.", "pripad": 19, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Slavík/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.81, 155"},
  {"front": "Případ 19: čeho se v arteterapii VYVAROVAT?", "back": "Nehodnotit dílo esteticky a nesrovnávat klienty (připomíná šikanu). Nepřetěžovat abstrakcí (F70 = konkrétní logika). Netlačit do kontaktu silou. Nepoužívat ironii a metafory v reflexi. Nezneužít sugestibilitu a nezaměňovat arteterapii za „výtvarku”.", "pripad": 19, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.78, 80, 81, 155"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u lehké MR (F70)?", "back": "1 Naladění (rituál) → 2 Rozcvička/volná stopa → 3 Vlastní tvorba na téma → 4 JEDNODUCHÁ REFLEXE nad dílem → 5 Ocenění procesu (↺). Oproti těžším stupňům přibývá krok REFLEXE (krátké věty, respekt k vadě řeči) — vyšší úroveň to unese.", "pripad": 19, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Slavík/Liebmann ⚠️ ověřit; stálost klinicky Vágnerová STR.82–83"},
  {"front": "Návrh konkrétních technik pro případ 19 (od jednoduchých po náročnější)?", "back": "Progrese: volná stopa/barva → jednoduchý symbol → příběh v obrázcích → autoportrét „kdo jsem” → skupinová tvorba + reflexe. Symbol = vyjádření prožitku; příběh = zpracování šikany; autoportrét = sebepojetí; skupina = nácvik kontaktu.", "pripad": 19, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík / Liebmann ⚠️ ověřit"},
  {"front": "Případ 19 vs. 22 — jak se liší arteterapeutický plán? (zkušební past)", "back": "Medailonek je téměř stejný (muž 34 let, vada řeči, ZŠ speciální, šikana). Rozdíl: případ 19 = lehká MR (F70, ≈ školák) → lze VÍC SYMBOLU a REFLEXE, práce na sebepojetí. Případ 22 = středně těžká MR (F71, ≈ předškolák) + AGRESIVITA/sebepoškozování → arteterapie hlavně jako VENTIL a regulace afektu, jasné hranice.", "pripad": 19, "obor": "klientská skupina", "tema": "srovnání F70 × F71", "zdroj": "klinicky Vágnerová STR.78, 82–83; arte ⚠️ ověřit"},
  {"front": "Případ 20 (stařecká demence + BPSD, žena 65 let): jaká je hlavní role arteterapie?", "back": "Primárně ZKLIDNĚNÍ neklidu a agitace (BPSD) a snižování úzkosti — NE léčba demence. Dále: ventil afektu místo výbuchu, kontakt proti izolaci, doprovázení v zármutku (čerstvé ovdovění), důstojnost. Akcent na PROCES, validaci a maximální strukturu a bezpečí. Poruchy emotivity jsou u demence typickým příznakem.", "pripad": 20, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.72–74"},
  {"front": "Co je validace a jak ji uplatnit v arteterapii u BPSD (případ 20)?", "back": "VALIDACE = přijetí prožívání nemocné BEZ konfrontace a vyvracení reality. V arteterapii: přijmout i její dílo, mluvit klidně, neopravovat realitu, neargumentovat logikou. Důvod: nemocná požadavky nechápe, konfrontace spustí afektivní výbuch a negativismus.", "pripad": 20, "obor": "arteterapie", "tema": "validace", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; princip Vágnerová STR.74, 76"},
  {"front": "Případ 20: proč arteterapie pomáhá (bio·psycho·sociál)?", "back": "BIO: smyslová stimulace a klidná aktivace (vozík; odmítání pohybu = apaticko-abulický syndrom, ne nespolupráce). PSYCHO: ventil afektu a zklidnění proti dráždivosti/výbuchům/negativismu + doprovázení v akutním zármutku. SOCIÁL: neverbální kontakt s terapeutem proti izolaci (ovdovění + synové 2× ročně); skupina až po zklidnění (úbytek empatie → konflikty).", "pripad": 20, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.73–76"},
  {"front": "Jak vést arteterapii u demence s BPSD (případ 20) — čím se vyznačuje?", "back": "ZKLIDNĚNÍ, ne výkon (nehodnotit esteticky). VALIDACE, ne konfrontace — nevyvracet realitu. NABÍDKA, ne nátlak — drobná dobrovolná aktivita po krocích (nadměrný požadavek = spouštěč obrany). STRUKTURA, bezpečí, předvídatelnost (snižuje výbuchy). Reminiscence + doprovázení v zármutku. Předcházet spouštěčům konfliktů (zpočátku individuálně).", "pripad": 20, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.73–76"},
  {"front": "Případ 20: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ i RECEPTIVNÍ (zklidnění), ZPOČÁTKU INDIVIDUÁLNÍ (kvůli konfliktům), NEDIREKTIVNÍ s VALIDACÍ, PROCES-orientovaná, MAXIMÁLNĚ STRUKTUROVANÁ a bezpečná. Cíle: zklidnění neklidu/agitace, snížení úzkosti, ventil afektu, kontakt proti izolaci, doprovázení v zármutku, důstojnost.", "pripad": 20, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.74–76"},
  {"front": "Případ 20: čeho se v arteterapii VYVAROVAT?", "back": "Nekonfrontovat a nevyvracet realitu, neargumentovat logikou (vyvolá výbuch). Netlačit do tvorby silou (nadměrný požadavek = spouštěč). Nehodnotit esteticky a nesrovnávat. Nepřičítat vinu za konflikty („dělá to schválně“ — je to příznak nemoci). Nepřehlížet zármutek a izolaci.", "pripad": 20, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.74–76"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u BPSD (případ 20)?", "back": "1 Klidné naladění (rituál) → 2 Validace + přijetí → 3 Smyslová/zklidňující tvorba → 4 Tiché sdílení (bez nátlaku) → 5 Ocenění PROCESU (↺ stále stejné pořadí). Stejný klidný rituál, krátké předvídatelné jednotky, nabízet (ne nutit), nevyvracet realitu.", "pripad": 20, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte validace/struktura Liebmann/Šicková-Fabrici ⚠️ ověřit; princip Vágnerová STR.74–76"},
  {"front": "Návrh konkrétních technik pro případ 20 (zklidňující → aktivizační)?", "back": "Progrese: smyslová hra s barvou → volná stopa/ventil napětí → reminiscenční malba → modelování → skupinová tvorba (až po zklidnění). Zklidňující práce s barvou = proti agitaci; volná stopa = ventil afektu místo výbuchu; reminiscenční malba = doprovázení v zármutku; modelování = haptické uvolnění; receptivní hudba/obrazy = zklidnění bez výkonu.", "pripad": 20, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 20 vs 4: čím se liší arteterapie u dvou demencí?", "back": "Společný základ: aktivizace, reminiscence, smyslová stimulace, krátké jednotky, stálost. Případ 20 (stařecká + BPSD): primárně ZKLIDNĚNÍ neklidu/agitace, snižování úzkosti, validace, ventil afektu, max. struktura, doprovázení v zármutku. Případ 4 (ischemicko-vaskulární): akcent na ORIENTACI a zpomalení úbytku.", "pripad": 20, "obor": "klientská skupina", "tema": "srovnání demencí", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️; klinicky Vágnerová STR.73–76"},
  {"front": "Případ 20: jak v arteterapii pracovat se zármutkem a izolací?", "back": "REMINISCENCE a doprovázení — vzpomínky na manžela jako podnět tvorby (zpracovat ztrátu, posílit identitu). Kontakt proti izolaci: bezpečný vztah s terapeutem, podpora návštěv synů (návštěvy známých působí podpůrně). Čerstvé ovdovění + řídké návštěvy jsou akutní zátěž, která BPSD zhoršuje — nepřehlížet.", "pripad": 20, "obor": "arteterapie", "tema": "zármutek a izolace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.74–76"},
  {"front": "Případ 21 (atypický autismus F84.1, muž 40 let, po ztrátě rodičů v ÚSP): čím se arteterapie liší od dětských PAS?", "back": "Jde o DOSPĚLÉHO → techniky a témata PŘIMĚŘENÉ VĚKU (NE dětské náměty), respekt a DŮSTOJNOST. Atypický autismus = nesplňuje plně kritéria dětského autismu (neúplná/atypická triáda). Akcent na zpracování ZTRÁTY blízkých, stabilní rutinu po nástupu do ÚSP a podporu autonomie.", "pripad": 21, "obor": "arteterapie", "tema": "definice", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.84, 87"},
  {"front": "Případ 21: proč právě arteterapie a na co hlavně cílí? (bio·psycho·sociál)", "back": "BIO: jemná motorika a haptika; pracovní/výtvarná činnost UCHOVÁVÁ KOMPETENCE a dává náplň. PSYCHO: NEVERBÁLNÍ zpracování ZTRÁTY (rodiče, sourozenec) a stabilní rutina proti úzkosti ze změny (PAS těžce nese změnu). SOCIÁL: stálá osoba (klíčový pracovník) + možná skupina s pravidly v ÚSP. POZOR: arteterapie NELÉČÍ autismus (vrozený i u dospělého).", "pripad": 21, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.84, 86–87"},
  {"front": "Jak vést arteterapii u dospělého s atypickým autismem — čím se vyznačuje?", "back": "Techniky PŘIMĚŘENÉ VĚKU (ne dětské), respekt a důstojnost. Práce s RUTINOU a STRUKTUROU (změna prostředí = rizikový faktor). Neverbální ZPRACOVÁNÍ ZTRÁTY + kontinuita přes známé předměty/motivy. PODPORA AUTONOMIE (volba materiálu/tématu, zachované dovednosti). Možná SKUPINA s jasnými pravidly. Proces > produkt, materiální odměna.", "pripad": 21, "obor": "arteterapie", "tema": "principy u dospělého s PAS", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.84, 86"},
  {"front": "Případ 21: jak v arteterapii řešit ZTRÁTU blízkých a ADAPTACI na ÚSP?", "back": "Neverbální cesta k TRUCHLENÍ (volná barevná plocha = ventil afektu) tam, kde slovo nestačí. KONTINUITA přes známý předmět/motiv z domova = zmírnění ztráty a změny. STABILNÍ rituál sezení + klíčový pracovník = bezpečí po přesunu. Afekt/regres = obrana, nezaměnit za demenci ani „zlobení”.", "pripad": 21, "obor": "arteterapie-technika", "tema": "zpracování ztráty a adaptace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; ztráta/změna klinicky Vágnerová STR.86"},
  {"front": "Případ 21: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ, INDIVIDUÁLNÍ + SKUPINOVÁ s jasnými pravidly (komunita ÚSP), nedirektivní, proces-orientovaná, STRUKTUROVANÁ s rutinou, témata a techniky PŘIMĚŘENÉ VĚKU. Cíle: zpracování ztráty, stabilita a adaptace na ÚSP, podpora autonomie a zachování dovedností, důstojnost.", "pripad": 21, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.84, 86–87"},
  {"front": "Případ 21: čeho se v arteterapii VYVAROVAT?", "back": "NEPOUŽÍVAT dětské náměty a materiály (jde o dospělého — důstojnost). Nezahltit změnami (náhlý přesun, nové osoby/režim). Nepodceňovat truchlení (afekt/regres ≠ zlobení, ani demence). Nehodnotit dílo esteticky. Neměnit zbytečně klíčovou osobu a strukturu. Nečekat motivaci sociální pochvalou.", "pripad": 21, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.86"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u dospělého s atypickým autismem?", "back": "1 Naladění (stálý rituál) → 2 Haptická rozcvička → 3 Tvorba (téma dle VOLBY) → 4 Sdílení (dle úrovně) → 5 Ocenění procesu (↺). Stálý rituál a struktura pro předvídatelnost po změně prostředí; téma a materiál PŘIMĚŘENÉ VĚKU a s prostorem pro volbu (autonomie); sdílení jen v míře dané úrovní.", "pripad": 21, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; stálost klinicky Vágnerová STR.86–87"},
  {"front": "Návrh konkrétních technik pro případ 21 (od jednodušších po náročnější)?", "back": "Progrese: haptika/hlína → volná barevná plocha → známý předmět/motiv (kontinuita) → jednoduchá pracovní/výtvarná činnost → skupinová tvorba s pravidly. Hlína = regulace napětí; barevná plocha = ventil afektu; známý motiv = zmírnění ztráty; pracovní činnost = autonomie a kompetence; skupina = příslušnost. Vše přiměřené věku.", "pripad": 21, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit; pracovní činnost Vágnerová STR.84"},
  {"front": "Případ 21: kdy a jak nasadit SKUPINOVOU arteterapii u dospělého s PAS v ÚSP?", "back": "Skupina je možná, ale jen s JASNÝMI, PŘEDVÍDATELNÝMI PRAVIDLY a stálou strukturou (komunita ÚSP) — dává příslušnost a řád. Nehodit do nestrukturované skupiny (změna a nepředvídatelnost = zátěž pro PAS). Vedle skupiny zachovat individuální vztah s klíčovým pracovníkem.", "pripad": 21, "obor": "skupinová arteterapie", "tema": "skupina s pravidly", "zdroj": "Liebmann ⚠️ ověřit; změna jako zátěž klinicky Vágnerová STR.86"},
  {"front": "Případ 22 (středně těžká MR F71 + agresivita/sebepoškozování): jakou roli má arteterapie?", "back": "Arteterapie jako VENTIL a REGULACE AFEKTU — tvorba bezpečně odvádí napětí, které se jinak vybíjí agresí a sebepoškozováním (autostimulace / uvolnění napětí z přetěžování). Klíč: jasné HRANICE, BEZPEČÍ a předvídatelný RITUÁL. POZOR: agrese/sebepoškozování = obrana/komunikace, NE „zlobení”.", "pripad": 22, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.82–83"},
  {"front": "Případ 22: proč arteterapie a na co cílí? (bio·psycho·sociál)", "back": "BIO: bezpečné vybití napětí tělesnou tvorbou (hnětení, trhání) místo sebepoškozování. PSYCHO: ventil afektu a regulace napětí (nadměrná zátěž jinak spouští afektivní výbuchy). SOCIÁL: KOMUNIKACE MÍSTO AFEKTU — sdělit potřebu obrazem/AAK, aby nemusel „mluvit” chováním. POZOR: arteterapie neléčí MR; agrese není příčina MR.", "pripad": 22, "obor": "arteterapie", "tema": "regulace afektu", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.80, 82–83"},
  {"front": "Jak vést arteterapii u středně těžké MR s agresivitou — čím se vyznačuje?", "back": "Proces > produkt (hodnocení = další frustrace). Arteterapie jako VENTIL afektu. JASNÉ HRANICE a bezpečí (trest nepatří — agrese je obrana/komunikace). PŘEDVÍDATELNÝ RITUÁL a stálost (stejné pořadí, materiál, terapeut). Vyhnout se FRUSTRUJÍCÍM úkolům (abstrakce, spěch). Materiály odvádějící napětí (trhání, hnětení).", "pripad": 22, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.80, 81–83"},
  {"front": "Případ 22: jak v arteterapii kanalizovat agresi do média?", "back": "Expresivní materiály odvádějící napětí: HNĚTENÍ a BUŠENÍ do hlíny, TRHÁNÍ papíru → trhaná KOLÁŽ (lepení), malba velkými pohyby na velký formát. Po vybití zařadit ZKLIDŇUJÍCÍ rytmickou tvorbu. Cíl: bezpečné vybití napětí místo sebepoškozování.", "pripad": 22, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.82"},
  {"front": "Případ 22: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ tvorba, NEJDŘÍV INDIVIDUÁLNÍ (skupina až po stabilizaci afektů), nedirektivní s JASNÝMI HRANICEMI, proces-orientovaná, silně STRUKTUROVANÁ a PŘEDVÍDATELNÁ. Cíle: regulace afektu a ventil napětí (místo agrese/sebepoškozování), neverbální komunikace, bezpečí po šikaně.", "pripad": 22, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.82–83"},
  {"front": "Případ 22: čeho se v arteterapii VYVAROVAT?", "back": "Nereagovat na agresi/sebepoškozování TRESTEM (je to obrana/komunikace; trest zvyšuje napětí). Nezadávat FRUSTRUJÍCÍ úkoly (abstrakce, mnoho kroků, spěch). Nehodnotit dílo esteticky. Neměnit rituál, materiál ani terapeuta. Netlačit na verbální interpretaci a do skupiny předčasně; nebagatelizovat šikanu.", "pripad": 22, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.80, 81–83, 155"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u F71 + agresivity?", "back": "1 Naladění (stálý rituál) → 2 Uvolnění napětí (hnětení/trhání) → 3 Vlastní tvorba (ventil) → 4 Zklidnění a neverbální sdílení → 5 Ocenění procesu (↺). Předvídatelný rituál a jasné hranice; kroky 2–3 = ventil afektu, krok 4 = zklidnění.", "pripad": 22, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; stálost/regulace afektu klinicky Vágnerová STR.81–83"},
  {"front": "Případ 22: jak nahradit „mluvení chováním” (komunikace místo afektu)?", "back": "Naučit srozumitelně SDĚLIT POTŘEBU obrazem a obrázkovými/AAK kartami, aby nemusel „mluvit” chováním (problémové chování u závažněji postižených = neverbální sdělení potřeb). Propojit s logopedií/AAK. Souběžně ANALÝZA SPOUŠTĚČŮ afektu a úprava zátěže.", "pripad": 22, "obor": "arteterapie", "tema": "komunikace místo afektu", "zdroj": "arte Liebmann/Slavík ⚠️ ověřit; klinicky Vágnerová STR.83"},
  {"front": "Případ 22 vs. 19 — jak se liší arteterapeutický plán? (zkušební past)", "back": "Medailonek je téměř stejný (muž 34 let, vada řeči, ZŠ speciální, šikana). Rozdíl: 22 = středně těžká MR (F71, ≈ předškolák) + AGRESIVITA/sebepoškozování → arteterapie hlavně jako VENTIL a regulace afektu, jasné hranice, předvídatelný rituál. 19 = lehká MR (F70, ≈ školák) bez agrese → lze víc SYMBOLU a REFLEXE.", "pripad": 22, "obor": "klientská skupina", "tema": "srovnání F71 × F70", "zdroj": "klinicky Vágnerová STR.78, 82–83; arte ⚠️ ověřit"},
  {"front": "Případ 23 (rozštěp páteře, závislost na matce): jakou roli má arteterapie?", "back": "Arteterapie jako prostor pro AKTÉRSTVÍ a VLASTNÍ HLAS — tvorba je její vlastní rozhodnutí a výsledek, do kterého matka nezasahuje. Cíl: posílit AUTONOMII, sebepojetí a sebedůvěru. Klíč: jádrem NENÍ tíže postižení (chodí o berlích, vystudovala SŠ), ale naučená nesamostatnost a závislost na matce.", "pripad": 23, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 58, 70"},
  {"front": "Případ 23: proč arteterapie a na co cílí? (bio·psycho·sociál)", "back": "BIO: tělesný stav umožňuje SAMOSTATNOU tvorbu → pocit „dokážu to sama“. PSYCHO: sebedůvěra a sebepojetí přes vlastní zážitek úspěchu; nácvik ROZHODOVÁNÍ proti pasivitě (chybí motivace, ne schopnosti). SOCIÁL: skupina = vztahy MIMO MATKU (symbiotická vazba jinak nahrazuje vrstevnické a partnerské vztahy). POZOR: arte neodstraní vadu — cílí na vztahový vzorec.", "pripad": 23, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 59, 62, 70"},
  {"front": "Jak vést arteterapii u naučené závislosti — čím se vyznačuje?", "back": "PODPORA AUTONOMIE, ne dopomoc — terapeut NEDĚLÁ ZA klientku, nabízí volbu a nechá ji rozhodovat. Klientka volí TÉMA, MATERIÁL i POSTUP (vlastní hlas). Proces > produkt (cení se i akt rozhodnutí). Tělesné ≠ mentální — využít zachovaný intelekt (SŠ), nabízet symbol a reflexi. Skupina pro vztahy mimo matku.", "pripad": 23, "obor": "arteterapie", "tema": "principy u závislosti", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR. 58–59, 70"},
  {"front": "Případ 23: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ tvorba, INDIVIDUÁLNÍ i SKUPINOVÁ (skupina pro vztahy mimo matku), NEDIREKTIVNÍ s důrazem na VOLBU a rozhodování, proces-orientovaná. Cíle: autonomie, sebepojetí a sebedůvěra, vlastní hlas, vztahy mimo matku. Cílit na vztahový vzorec, ne na tíži postižení.", "pripad": 23, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR. 58–59, 70"},
  {"front": "Případ 23: čeho se v arteterapii VYVAROVAT?", "back": "NEDĚLAT ZA klientku, co zvládne sama („pomoc pro jistotu“ upevňuje pasivně-receptivní postoj). Nepřičítat nesoběstačnost jen postižení (je z velké části naučená). Nepodceňovat intelekt (tělesné ≠ mentální). Nehodnotit dílo esteticky. Nepodporovat symbiotickou vazbu — nezavírat terapii jen do dvojice klientka–pečující.", "pripad": 23, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 58–59, 62, 70"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u závislosti na matce?", "back": "1 Naladění + vlastní volba → 2 Rozhodnutí o tématu → 3 Samostatná tvorba → 4 Sdílení ve skupině → 5 Reflexe „co jsem zvládla“ (↺). Klientka v každém kroku rozhoduje SAMA; terapeut nedělá za ni; reflexe cílí na zážitek vlastní kompetence.", "pripad": 23, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; autonomie klinicky Vágnerová STR. 58–59, 70"},
  {"front": "Návrh konkrétních technik pro případ 23 (volba → autorství)?", "back": "Progrese: výběr z nabídky → vlastní volba materiálu → AUTOPORTRÉT / „kdo jsem“ → vlastní projekt → prezentace ve skupině. „Já si vybírám“ = nácvik rozhodování; autoportrét = sebepojetí (z „závislá dcera“ k „dospělá“); vlastní projekt = „dokázala jsem to sama“; „moje budoucnost“ = motivace k samostatnému životu.", "pripad": 23, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík ⚠️ ověřit"},
  {"front": "Případ 23: jak arteterapie pracuje se sebepojetím a aktérstvím?", "back": "Tvorba činí klientku AUTORKOU díla i rozhodnutí → posun sebepojetí z „závislá dcera“ k „dospělá, která rozhoduje“. PROJEKCE do autoportrétu/„kdo jsem“ zviditelní vlastní obraz sebe sama. Každé „udělala jsem to sama“ posiluje autonomii proti naučené závislosti.", "pripad": 23, "obor": "arteterapie-diagnostika", "tema": "sebepojetí / projekce", "zdroj": "Šicková-Fabrici / Slavík ⚠️ ověřit; klinicky Vágnerová STR. 59, 70"},
  {"front": "Případ 23 vs. 15 — jak se liší arteterapeutický plán? (zkušební past)", "back": "Stejná vada (rozštěp páteře), JINÉ jádro. 23 = žena 30 let, závislost na matce → arteterapie pro AUTONOMII a aktérství (vlastní hlas, separace, vztahy mimo matku). 15 = chlapec 15 let + TÝRÁNÍ (CAN) → bezpečný kanál pro trauma, obnova důvěry, pozor na re-traumatizaci. Závislost × trauma = jiný cíl.", "pripad": 23, "obor": "klientská skupina", "tema": "srovnání 23 × 15", "zdroj": "klinicky Vágnerová STR. 58, 70, 181–183; arte ⚠️ ověřit"}
];

const el = id => document.getElementById(id);
let view = CARDS.slice();   // aktuální (filtrovaná/zamíchaná) sada
let idx = 0;

// naplnit filtry
(function initFilters(){
  const cases = [...new Set(CARDS.map(c=>c.pripad))].sort((a,b)=>a-b);
  cases.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent='Případ '+n;el('fCase').appendChild(o);});
  const obory = [...new Set(CARDS.map(c=>c.obor))].sort();
  obory.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;el('fObor').appendChild(o);});
})();

function applyFilter(){
  const fc = el('fCase').value, fo = el('fObor').value;
  view = CARDS.filter(c => (fc==='all'||String(c.pripad)===fc) && (fo==='all'||c.obor===fo));
  idx = 0; render();
}
function render(){
  const card = el('card');
  card.classList.remove('flipped');
  if(view.length===0){
    el('frontText').textContent='Žádné karty pro tento filtr.';
    el('backText').textContent=''; el('frontTags').innerHTML=''; el('backTags').innerHTML='';
    el('backSrc').innerHTML=''; el('counter').textContent='0 / 0'; return;
  }
  const c = view[idx];
  const tags = `<span class="tag case">Případ ${c.pripad}</span><span class="tag obor">${c.obor}</span><span class="tag">${c.tema}</span>`;
  el('frontTags').innerHTML = tags;
  el('backTags').innerHTML = tags;
  el('frontText').textContent = c.front;
  el('backText').textContent = c.back;
  el('backSrc').innerHTML = 'Zdroj: <b>'+c.zdroj+'</b>';
  el('counter').textContent = (idx+1)+' / '+view.length;
}
function flip(){ if(view.length) el('card').classList.toggle('flipped'); }
function next(){ if(!view.length)return; idx=(idx+1)%view.length; render(); }
function prev(){ if(!view.length)return; idx=(idx-1+view.length)%view.length; render(); }
function shuffle(){ for(let i=view.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[view[i],view[j]]=[view[j],view[i]];} idx=0; render(); }

el('card').addEventListener('click', flip);
el('flip').addEventListener('click', e=>{e.stopPropagation();flip();});
el('next').addEventListener('click', next);
el('prev').addEventListener('click', prev);
el('shuffle').addEventListener('click', shuffle);
el('reset').addEventListener('click', applyFilter);
el('fCase').addEventListener('change', applyFilter);
el('fObor').addEventListener('change', applyFilter);
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') next();
  else if(e.key==='ArrowLeft') prev();
  else if(e.key===' '){e.preventDefault();flip();}
});
render();
</script>
