<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arteterapie — výukové karty</title>
<style>
  :root{
    --bg:#0f1226; --panel:#1a1f3a; --card:#232a52; --card2:#2c3566;
    --accent:#e08a5a; --accent2:#e0b15a; --text:#eef1ff; --muted:#9aa3cf;
    --warn:#ffcf6b; --shadow:0 12px 34px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#22284e 0%,var(--bg) 60%);color:var(--text);min-height:100vh}
  header{padding:18px 16px 6px;text-align:center}
  header h1{margin:0;font-size:20px;letter-spacing:.3px}
  header p{margin:4px 0 0;color:var(--muted);font-size:13px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;
    padding:14px 16px;max-width:900px;margin:0 auto}
  .controls label{font-size:12px;color:var(--muted);margin-right:4px}
  select,button{font-size:14px;border-radius:10px;border:1px solid #38406f;background:var(--panel);
    color:var(--text);padding:8px 12px;cursor:pointer;transition:.15s}
  select:hover,button:hover{border-color:var(--accent)}
  button.primary{background:linear-gradient(180deg,var(--accent),#c0562f);border:none;font-weight:600}
  button.ghost{background:transparent}
  .counter{font-variant-numeric:tabular-nums;color:var(--muted);font-size:13px;min-width:64px;text-align:center}
  .stage{max-width:760px;margin:6px auto 0;padding:0 16px}
  .card{position:relative;width:100%;min-height:340px;border-radius:20px;cursor:pointer;
    perspective:1600px;user-select:none}
  .inner{position:relative;width:100%;height:100%;min-height:340px;transition:transform .5s;
    transform-style:preserve-3d}
  .card.flipped .inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:28px 26px;
    display:flex;flex-direction:column;box-shadow:var(--shadow);border:1px solid #3a4275}
  .front{background:linear-gradient(160deg,var(--card),#1d2347)}
  .back{background:linear-gradient(160deg,var(--card2),#222a55);transform:rotateY(180deg)}
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tag{font-size:11px;padding:3px 9px;border-radius:999px;background:#33407f;color:#cdd6ff;
    letter-spacing:.3px;text-transform:uppercase}
  .tag.case{background:#3a2f6b;color:#d9c9ff}
  .tag.obor{background:#1f4a44;color:#aef0db}
  .qa-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
  .qa{font-size:19px;line-height:1.5;font-weight:600;flex:1;display:flex;align-items:center}
  .back .qa{font-weight:500;font-size:17px;align-items:flex-start}
  .src{margin-top:16px;font-size:12px;color:var(--muted);border-top:1px solid #ffffff14;padding-top:10px}
  .src b{color:var(--accent2);font-weight:600}
  .hint{text-align:center;color:var(--muted);font-size:12px;margin:14px 0 24px}
  .nav{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:16px}
  kbd{background:#2a3160;border:1px solid #444c85;border-radius:6px;padding:1px 6px;font-size:11px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  @media(max-width:520px){.qa{font-size:17px}.face{padding:22px 18px}}
</style>
</head>
<body>
<header>
  <h1>Arteterapie — výukové karty</h1>
  <p>Klikni na kartu = otočení. Šipky ◀ ▶ = předchozí / další · <kbd>mezerník</kbd> = otočit</p>
</header>

<div class="controls">
  <span><label for="fCase">Případ</label>
  <select id="fCase"><option value="all">Vše</option></select></span>
  <span><label for="fObor">Obor</label>
  <select id="fObor"><option value="all">Vše</option></select></span>
  <button id="shuffle" class="ghost">🔀 Zamíchat</button>
  <button id="reset" class="ghost">↺ Pořadí</button>
  <span class="counter" id="counter">0 / 0</span>
</div>

<div class="stage">
  <div id="cardWrap">
    <div class="card" id="card">
      <div class="inner">
        <div class="face front">
          <div class="tags" id="frontTags"></div>
          <div class="qa-label">Otázka</div>
          <div class="qa" id="frontText"></div>
        </div>
        <div class="face back">
          <div class="tags" id="backTags"></div>
          <div class="qa-label">Odpověď</div>
          <div class="qa" id="backText"></div>
          <div class="src" id="backSrc"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="nav">
    <button id="prev" class="primary">◀ Předchozí</button>
    <button id="flip" class="ghost">Otočit</button>
    <button id="next" class="primary">Další ▶</button>
  </div>
  <div class="hint">Zdroj u každé odpovědi: arteterapie = <b>Šicková-Fabrici / Slavík / Liebmann</b> (⚠️ ověřit); <b>Vágnerová</b> = klinické pozadí.</div>
</div>

<script>
// === DATA (generováno z karty-data.json — kanonický zdroj) ===
const CARDS = [
  {"front": "Co je arteterapie a co je na ní léčebně účinné?", "back": "Léčebné a podpůrné využití VÝTVARNÉHO projevu. Léčebně účinný je tvořivý PROCES a prožitek (vyjádření, komunikace, sebepoznání, změna), NE estetická kvalita výsledku — proto se dílo nehodnotí esteticky (zásada „proces > produkt“).", "pripad": 1, "obor": "arteterapie", "tema": "definice", "zdroj": "Šicková-Fabrici ⚠️ ověřit"},
  {"front": "Jak se arteterapie dělí (3 hlediska) a co platí pro případ 1?", "back": "1) Podle aktivity: RECEPTIVNÍ (vnímání hotového díla) × PRODUKTIVNÍ/aktivní (vlastní tvorba). 2) Podle uspořádání: INDIVIDUÁLNÍ × SKUPINOVÁ. 3) Podle cíle: arteterapie (terapeutický cíl) × artefiletika (výchovně-vzdělávací). Případ 1 (středně těžká MR): produktivní, individuální i skupinová.", "pripad": 1, "obor": "arteterapie", "tema": "dělení", "zdroj": "Šicková-Fabrici ⚠️ ověřit"},
  {"front": "Rozdíl arteterapie × artefiletika? (častá zkušební chyba)", "back": "ARTETERAPIE = terapie/podpora výtvarným projevem (terapeutický cíl). ARTEFILETIKA = výchovně-vzdělávací přístup spojující tvorbu, ZÁŽITEK a REFLEKTIVNÍ DIALOG nad dílem (Slavík). Ve stacionáři/škole spíš artefiletika, v terapii arteterapie — nezaměňovat.", "pripad": 1, "obor": "artefiletika", "tema": "arteterapie × artefiletika", "zdroj": "Slavík ⚠️ ověřit"},
  {"front": "Případ 1 (středně těžká MR + vada řeči): proč právě arteterapie? (bio·psycho·sociál)", "back": "Nabízí NEVERBÁLNÍ kanál tam, kde selhává řeč. BIO: senzomotorika + náhradní kanál pro napětí místo okusování nehtů. PSYCHO: sebevyjádření bez slov, zážitek úspěchu proti apatii. SOCIÁL: vztah s terapeutem (citová jistota) a skupina. POZOR: arteterapie NELÉČÍ MR (vrozená porucha CNS) — je podpůrná a rozvojová.", "pripad": 1, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.78, 80–81, 83"},
  {"front": "Jak vést arteterapii u středně těžké MR (čím se vyznačuje)?", "back": "Proces > produkt (nehodnotit esteticky). SENZOMOTORICKÁ úroveň — dotek, stopa, barva místo abstraktního symbolu (uvažování ≈ předškolák). Krátká jasná zadání + STÁLÝ RITUÁL a opakování (potřeba stereotypu a jistoty). Nedirektivní doprovázení a dopomoc po krocích. Neverbální sdílení (obrázkové/AAK karty).", "pripad": 1, "obor": "arteterapie", "tema": "principy u MR", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️; klinicky Vágnerová STR.78, 82"},
  {"front": "Arteterapie u případu 1 — čeho se VYVAROVAT?", "back": "Nehodnotit dílo esteticky a nesrovnávat klienty mezi sebou. Nepřetěžovat (abstrakce, mnoho kroků najednou). Netlačit na verbální interpretaci ani na symboliku (respektovat vadu řeči a senzomotorickou úroveň). Často neměnit rituál, materiál ani terapeuta. Nezaměňovat arteterapii za „výtvarku“ (výkon a známkování).", "pripad": 1, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.80–81"},
  {"front": "Případ 1: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ (vlastní tvorba), individuální i SKUPINOVÁ, NEDIREKTIVNÍ, PROCES-orientovaná, STRUKTUROVANÁ s opakováním. Cíle: neverbální sebevyjádření, regulace napětí (místo okusování nehtů), zážitek úspěchu proti apatii, rozvoj jemné motoriky.", "pripad": 1, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️; cíle klinicky Vágnerová STR.81, 83"},
  {"front": "Návrh: jak vypadá cyklus jednoho arteterapeutického sezení (u MR)?", "back": "1 Naladění (rituál) → 2 Haptická rozcvička → 3 Vlastní tvorba → 4 Neverbální sdílení → 5 Ocenění PROCESU (↺ stále stejné pořadí). Stejný rituál a sled, krátké kroky, jeden materiál; důraz na proces, ne na výsledek.", "pripad": 1, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️; stálost klinicky Vágnerová STR.82–83"},
  {"front": "Návrh konkrétních technik pro případ 1 (od jednoduchých po náročnější)?", "back": "Progrese: otisky/haptika → čmárání/volná stopa → jednoduchá malba → modelování → společná koláž. Otisky a prstové barvy = senzomotorika a uvolnění; čmárání = ventil napětí (místo okusování nehtů); modelování (hlína) = jemná motorika; společná koláž = příslušnost a sdílení ve skupině.", "pripad": 1, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Co je projekce v arteterapii a jak ji u MR interpretovat?", "back": "PROJEKCE = promítnutí vnitřního stavu a prožívání do díla; je základem arteterapeutické DIAGNOSTIKY. U středně těžké MR interpretovat ZDRŽENLIVĚ — nepřeceňovat symboliku, respektovat senzomotorickou úroveň a vadu řeči.", "pripad": 1, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit"},
  {"front": "Případ 2 (Aspergerův sy F84.5, chlapec 12 let, vysokofunkční): čím se arteterapie liší od těžších forem PAS?", "back": "Vysoká verbální i kognitivní úroveň (intelekt i řeč v normě) → NEJVÍC PROSTORU PRO SYMBOL, PŘÍBĚH v obraze a REFLEXI nad dílem (blízko artefiletice) + EMOČNÍ GRAMOTNOST. U dětského/nízkofunkčního autismu se naopak zůstává na neverbální a senzomotorické úrovni.", "pripad": 2, "obor": "artefiletika", "tema": "definice", "zdroj": "arte Slavík/Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.87"},
  {"front": "Případ 2: proč právě arteterapie a na co hlavně cílí? (bio·psycho·sociál)", "back": "BIO: jemná motorika (možná neobratnost), POZOR na senzorickou citlivost materiálů (nabídnout volbu media). PSYCHO: emoční gramotnost přes obraz + ventil ÚZKOSTI a obnova sebehodnocení po sociálním neúspěchu. SOCIÁL: bezpečný nácvik vztahů a sociální příběhy (jádrem je porucha sociálních vztahů). POZOR: arteterapie NELÉČÍ Aspergerův sy (vrozená neurovývojová porucha).", "pripad": 2, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.84, 86–87"},
  {"front": "Jak vést arteterapii u Aspergerova syndromu — čím se vyznačuje?", "back": "Proces > produkt (u perfekcionisty tlak z výkonu výslovně brát). SYMBOL, PŘÍBĚH a REFLEXE nad dílem (artefiletika), ale konkrétně a explicitně. STRUKTURA a PŘEDVÍDATELNOST (vizuální rozvrh, stálý rituál). ULPÍVAVÝ ZÁJEM jako téma tvorby a most ke vztahům. NENUTIT interpretaci ani oční kontakt, bez ironie a metafor.", "pripad": 2, "obor": "arteterapie", "tema": "principy u Aspergera", "zdroj": "arte Slavík/Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.86–87"},
  {"front": "Případ 2: jak v arteterapii rozvíjet EMOČNÍ GRAMOTNOST a čtení sociálních situací?", "back": "„Mapa pocitů” / barvy nálad = pojmenovat a zviditelnit emoce. SYMBOL prožitku (co cítím = jaký tvar/barva). SOCIÁLNÍ PŘÍBĚH v obrázcích (comic strip) = co druhý cítí a proč → trénink čtení situací. Obraz funguje jako vnější, méně ohrožující jazyk emocí tam, kde vázne sociální čtení.", "pripad": 2, "obor": "artefiletika", "tema": "emoční gramotnost", "zdroj": "arte Slavík/Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.87"},
  {"front": "Případ 2: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ i receptivní s ARTEFILETICKÝM přesahem (reflexe), nejdřív INDIVIDUÁLNĚ → strukturovaná SKUPINA, nedirektivní, proces-orientovaná, STRUKTUROVANÁ a předvídatelná. Cíle: emoční gramotnost, regulace úzkosti, nácvik sociálních dovedností přes obraz, obnova sebehodnocení.", "pripad": 2, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Slavík/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.86–87"},
  {"front": "Případ 2: čeho se v arteterapii VYVAROVAT?", "back": "Nehodnotit dílo esteticky a nesrovnávat (u perfekcionisty citlivé). NENUTIT interpretaci ani oční kontakt. Nepoužívat ironii a metafory (chápe doslovně). Neměnit náhle rituál a strukturu (úzkost/afekt). Nepřetěžovat senzoricky (lepkavé/studené/hlučné materiály). Nezaměňovat arteterapii za „výtvarku”.", "pripad": 2, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.86–87"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u Aspergera?", "back": "1 Naladění (rituál) → 2 Volné rozkreslení → 3 Tvorba na téma → 4 REFLEXE nad dílem → 5 Ocenění procesu (↺). Oproti těžším formám PAS přibývá výrazný krok REFLEXE (vysoký intelekt to unese) — konkrétně, bez ironie, nenutit interpretaci. Stálý rituál + vizuální rozvrh = předvídatelnost.", "pripad": 2, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Slavík/Liebmann ⚠️ ověřit; stálost klinicky Vágnerová STR.86–87"},
  {"front": "Návrh konkrétních technik pro případ 2 (od jednodušších po náročnější)?", "back": "Progrese: barvy nálad/mapa pocitů → symbol prožitku → téma oblíbeného (ulpívavého) zájmu → sociální příběh v obraze → skupinová tvorba + reflexe. Mapa pocitů = emoce; symbol = prožitek; zájem = motivace a sebevědomí; sociální příběh = čtení situací; skupina = nácvik vztahů.", "pripad": 2, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík / Liebmann ⚠️ ověřit"},
  {"front": "Případ 2 vs. 16/18 — jak se liší arteterapeutický plán napříč PAS? (zkušební past)", "back": "Případ 2 (Asperger, vysokofunkční) → MAXIMUM symbolu, reflexe a emoční gramotnosti, sociální příběhy. Případ 16 (dětský autismus + porucha řeči) → NEVERBÁLNÍ kanál, vizuální struktura, piktogramy, senzomotorika. Případ 18 (nízkofunkční + sluch. vnímání) → BAZÁLNÍ stimulace, materiál jako regulace, minimum abstrakce. Stejná diagnóza ‚spektrum', jiná funkční úroveň = jiný plán.", "pripad": 2, "obor": "klientská skupina", "tema": "srovnání napříč PAS", "zdroj": "klinicky Vágnerová STR.85–87; arte ⚠️ ověřit"},
  {"front": "Případ 3 (ADHD + koktavost, 10 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "BIO: pohyb v tvorbě jako účelné VYBITÍ energie (kterou dítě jinak nedovede uplatnit) + jemná/hrubá motorika a koordinace. PSYCHO: nácvik pozornosti a sebeovládání KROK PO KROKU, ventil afektu, zážitek úspěchu proti negativnímu sebepojetí. SOCIÁL: NEVERBÁLNÍ kanál bez tlaku na řeč (koktavost), přijetí navzdory rušivosti. POZOR: arteterapie NELÉČÍ ADHD (odchylka funkce CNS/LMD) — je podpůrná.", "pripad": 3, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.43–45"},
  {"front": "Případ 3: které dělení arteterapie zvolit a proč nejdřív individuálně?", "back": "PRODUKTIVNÍ (vlastní tvorba), NEJPRVE INDIVIDUÁLNÍ → pak opatrně skupina, ve škole s artefiletickým přesahem. Individuálně proto, že dítě je „vázané na podněty” a snadno rušivé → potřebuje strukturu a klidné prostředí s méně podněty; skupinu zařadit až po nácviku čekání a sdílení.", "pripad": 3, "obor": "arteterapie", "tema": "dělení", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.44"},
  {"front": "Jak vést arteterapii u ADHD (čím se vyznačuje)?", "back": "KRÁTKÉ STRUKTUROVANÉ úkoly (jeden krok, jedna instrukce) — vyhovují slabé pozornosti a impulzivitě. POHYB v tvorbě + pauzy (kanalizace energie). Proces > produkt (oceňuje se dokončení a snaha). Předvídatelný RITUÁL a klidné prostředí bez rušivých podnětů. Neverbální sdílení bez tlaku na řeč. Nácvik sebeovládání po krocích („stop”, řízené tempo, čekání).", "pripad": 3, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.43–44"},
  {"front": "Případ 3: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ, nejprve individuální, NEDIREKTIVNÍ s PEVNOU STRUKTUROU, proces-orientovaný, krátké strukturované úkoly s pohybem. Cíle: KANALIZACE energie, nácvik POZORNOSTI a SEBEOVLÁDÁNÍ po krocích, jemná/hrubá motorika a koordinace, neverbální kanál bez tlaku na řeč, ochrana sebepojetí.", "pripad": 3, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.44–45"},
  {"front": "Případ 3: čeho se v arteterapii VYVAROVAT?", "back": "Nevykládat projevy jako „nevychovanost”/lenost (porucha CNS, kterou dítě neovládá). Nepřetěžovat dlouhým mnohakrokovým zadáním. Netlačit na řeč, nedokončovat slova, nespěchat (tlak koktavost zhoršuje). Nehodnotit dílo esteticky a nesrovnávat se sestrou/vrstevníky. Nepracovat v přeplněném rušivém prostředí (vázanost na podněty).", "pripad": 3, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.44–45"},
  {"front": "Návrh: jak vypadá cyklus jednoho arteterapeutického sezení u ADHD?", "back": "1 Naladění (rituál) → 2 POHYBOVÁ rozcvička → 3 KRÁTKÝ strukturovaný úkol → 4 Neverbální sdílení → 5 Ocenění PROCESU a dokončení (↺ stále stejné pořadí). Stálé pořadí, krátké kroky, vložený pohyb, jedna instrukce po druhé.", "pripad": 3, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; strukturace/ocenění klinicky Vágnerová STR.43–45"},
  {"front": "Návrh konkrétních technik pro případ 3 (od jednoduchých po náročnější)?", "back": "Progrese: pohybové čmárání (velký formát vestoje) → otisky/haptika → jednoduchá malba → modelování (koordinace) → řízená koláž/komiks po krocích. Pohybové čmárání = vybití energie a hrubá motorika; modelování = jemná motorika a koordinace ruka–oko; „stop” technika = nácvik brzdění impulzu.", "pripad": 3, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 3: jak v arteterapii pracovat s koktavostí?", "back": "Nabídnout NEVERBÁLNÍ kanál (obraz, hmota) bez nároku na plynulost; sdílet nad dílem, ne mluvením. NETLAČIT, nedokončovat slova, NESPĚCHAT — tlak a spěch zadrhávání zhoršují. Klidné tempo a bezpečí. Propojit s logopedií. (koktavost rámcově Lechta)", "pripad": 3, "obor": "arteterapie", "tema": "neverbální komunikace", "zdroj": "arte Slavík/Šicková-Fabrici ⚠️ ověřit; koktavost Lechta ⚠️; klinicky Vágnerová STR.44"},
  {"front": "Případ 3: jak odlišit ADHD od poruchy chování a MR (rozdíl regulace)?", "back": "ADHD: dítě chování NEDOKÁŽE OVLÁDAT (porucha aktivace + pozornosti, odchylka CNS) — arte cílí na REGULACI a kanalizaci energie. Porucha chování (11): normy CHÁPE, ale neakceptuje → jde o postoj k normě. Mentální retardace (1/19/22): snížený INTELEKT, senzomotorická úroveň; u ADHD je inteligence neporušená. PAS (2/16): jádro je sociální komunikace, ne regulace pozornosti.", "pripad": 3, "obor": "klientská skupina", "tema": "diferenciace", "zdroj": "klinicky Vágnerová STR.44; srovnání napříč kazuistikami"},
  {"front": "Co je projekce v arteterapii a jak ji u ADHD interpretovat?", "back": "PROJEKCE = promítnutí vnitřního stavu a prožívání do díla; základ arteterapeutické DIAGNOSTIKY. U ADHD interpretovat OPATRNĚ — dílo bývá ovlivněné impulzivitou a unavitelností (povrchnost, nedokončenost), což je projev poruchy regulace, ne nezájmu; nepřeceňovat a vždy posuzovat v kontextu sebepojetí dítěte.", "pripad": 3, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.44–45"},
  {"front": "Případ 4 (demence, žena 70 let, ischemicko-vaskulární typ): jaká je role arteterapie?", "back": "AKTIVIZACE a podpora ZACHOVANÝCH funkcí — NE léčba demence. Cíl: zpomalit úbytek, udržet kontakt a orientaci, zachovat důstojnost. Akcent na PROCES, ne výkon, a na krátké jednotky. POZOR: demence je ZÍSKANÝ, progredující a ireparabilní úbytek na organickém (cévním) podkladě → arteterapie nezvrátí, jen podpoří.", "pripad": 4, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.72, 74–75"},
  {"front": "Co je reminiscence v arteterapii a proč je u demence (případ 4) klíčová?", "back": "REMINISCENCE = práce se vzpomínkami a STAROU pamětí skrze obraz, materiál, staré fotky, písně a předměty. U demence je vhodná, protože stará paměť zůstává zachována DÉLE než učení novému (to selhává jako první). Posiluje sebevědomí („co jsem dříve zvládla“) a identitu.", "pripad": 4, "obor": "arteterapie", "tema": "reminiscence", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; stará paměť klinicky Vágnerová STR.72–74"},
  {"front": "Případ 4: proč arteterapie pomáhá (bio·psycho·sociál)?", "back": "BIO: smyslová stimulace a jemná motorika, mírná aktivace proti unavitelnosti. PSYCHO: reminiscence (stará paměť) + zážitek úspěchu proti apaticko-abulickému ladění a depresivním rozladám (zachovaný náhled na úbytek paměti). SOCIÁL: neverbální kontakt s terapeutem a skupinou proti izolaci, most k rodině (návštěvy známých působí podpůrně).", "pripad": 4, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.74–76"},
  {"front": "Jak vést arteterapii u demence (případ 4) — čím se vyznačuje?", "back": "Proces > produkt (nehodnotit esteticky). AKTIVIZACE, ne výkon — zpomalit úbytek, ne učit nové. REMINISCENČNÍ prvky (fotky, písně, předměty). SMYSLOVÁ stimulace (barva, dotek, materiál). KRÁTKÉ jednotky + stálý rituál a prostředí (změna zhoršuje dezorientaci). Bez konfrontace a nátlaku — nabízet, neopravovat realitu silou.", "pripad": 4, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.73–76"},
  {"front": "Případ 4: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ i RECEPTIVNÍ (vzpomínkové obrazy, hudba), individuální i SKUPINOVÁ, NEDIREKTIVNÍ, PROCES-orientovaná, silně STRUKTUROVANÁ s reminiscenčními prvky. Cíle: aktivizace zachovaných funkcí, podpora ORIENTACE, zpomalení úbytku, kontakt proti izolaci, důstojnost.", "pripad": 4, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.75–76"},
  {"front": "Případ 4: čeho se v arteterapii VYVAROVAT?", "back": "Nehodnotit esteticky a nesrovnávat. Nepřetěžovat — nadměrný požadavek spouští výbuchy/obranu. Neměnit zbytečně rituál, materiál ani prostředí (změna zhoršuje dezorientaci). Nevyvracet logikou nesmyslné nápady ani netestovat paměť na nové věci. Nezaměňovat arteterapii za „výtvarku“ ani za pouhé vyplnění času.", "pripad": 4, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.74–76"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u demence (případ 4)?", "back": "1 Známé naladění (rituál) → 2 Smyslová rozcvička → 3 Reminiscenční podnět (foto/píseň) → 4 Krátká tvorba → 5 Sdílení + ocenění PROCESU (↺ stále stejné pořadí). Stejný rituál a prostředí, krátké jednotky, jeden materiál — stálost snižuje dezorientaci.", "pripad": 4, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; stálost klinicky Vágnerová STR.74–76"},
  {"front": "Návrh konkrétních technik pro případ 4 (od jednoduchých po náročnější)?", "back": "Progrese: smyslová hra s barvou → otisky/haptika → malba ke vzpomínce → koláž ze starých fotek → společná skupinová tvorba. Smyslová hra = senzorická stimulace; reminiscenční malba/koláž = stará paměť a identita; modelování = jemná motorika; receptivní vnímání obrazů a hudby z mládí = zklidnění bez nároku na výkon.", "pripad": 4, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 4 vs 20: čím se liší arteterapie u dvou demencí?", "back": "Společný základ: aktivizace, reminiscence, smyslová stimulace, krátké jednotky, stálost. Případ 4 (ischemicko-vaskulární): akcent na ORIENTACI a zpomalení úbytku. Případ 20 (stařecká + BPSD): primárně ZKLIDNĚNÍ neklidu/agitace a snižování úzkosti, ještě více struktury a bezpečí, validace.", "pripad": 4, "obor": "klientská skupina", "tema": "srovnání demencí", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️; klinicky Vágnerová STR.73–76"},
  {"front": "Co je projekce v arteterapii a jak ji u demence (případ 4) interpretovat?", "back": "PROJEKCE = promítnutí vnitřního stavu do díla; základ arteterapeutické DIAGNOSTIKY. U demence interpretovat velmi ZDRŽENLIVĚ — kognitivní úbytek, bradypsychismus a riziko afázie zkreslují projev; nepřeceňovat symboliku, sledovat spíš kontakt, prožitek a zachované schopnosti.", "pripad": 4, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.73"},
  {"front": "Případ 5 (stav po CMP + získaná afázie, muž 50 let): proč právě arteterapie?", "back": "Nabízí NEVERBÁLNÍ kanál komunikace tam, kde selhává řeč (afázie), a prostor pro ZPRACOVÁNÍ ZTRÁTY a změny identity u získaného postižení. Dále: rehabilitační podpora jemné motoriky, adaptace na hemiparézu. POZOR: arteterapie neléčí afázii (důsledek poškození mozku po CMP) — je podpůrná a rehabilitační.", "pripad": 5, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.49, 53"},
  {"front": "Případ 5: proč je „vyhýbá se komunikaci“ klíč pro volbu arteterapie?", "back": "Vyhýbání NENÍ neochota ani nezájem — je to DŮSLEDEK afázie + obranný ÚNIK z frustrující situace (mluvení je namáhavé). Arteterapie obchází tlak na slovo: nabízí obraz, barvu a gesto jako náhradní řeč, takže komunikace probíhá bez frustrace z mluvení.", "pripad": 5, "obor": "arteterapie", "tema": "neverbální komunikace", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.49, 53"},
  {"front": "Případ 5: proč arteterapie pomáhá (bio·psycho·sociál)?", "back": "BIO: podpora jemné motoriky v neurorehabilitaci + adaptace na hemiparézu (jednoruční techniky); největší zlepšení v prvních 6 měsících po CMP. PSYCHO: sebevyjádření bez slov a ventil frustrace, zpracování traumatu a změny identity (riziko deprese/úzkosti). SOCIÁL: neverbální kontakt proti izolaci, skupina po CMP (efekt similarity).", "pripad": 5, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.49–50, 53"},
  {"front": "Jak vést arteterapii u afázie po CMP (případ 5) — čím se vyznačuje?", "back": "NEVERBÁLNÍ komunikace na prvním místě (obraz, gesto, AAK místo tlaku na mluvení). BEZ tlaku a beze spěchu (spěch zvyšuje napětí a únik). Proces > produkt. RESPEKT k zachovanému intelektu (nemluvit „přes hlavu“ — afázie je porucha řeči, ne rozumu). ADAPTACE na hemiparézu (jednoruční techniky) a unavitelnost (krátké jednotky). Zpracování ztráty a identity.", "pripad": 5, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.49–50, 53–54"},
  {"front": "Případ 5: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ, NEJDŘÍV INDIVIDUÁLNÍ (bezpečí), pak SKUPINA po CMP, NEDIREKTIVNÍ, PROCES-orientovaná, BEZTLAKOVÁ, adaptovaná na hemiparézu. Cíle: neverbální komunikace, zpracování ztráty a změny identity, snížení frustrace a úniku, podpora jemné motoriky.", "pripad": 5, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.49–50, 53"},
  {"front": "Případ 5: čeho se v arteterapii VYVAROVAT?", "back": "Nespěchat a netlačit na verbální reakci (zvyšuje napětí a únik). Nehodnotit esteticky a nesrovnávat. Nevykládat mlčení jako „neochotu“. Nemluvit „přes hlavu“ jako s nesvéprávným (respektovat zachovaný intelekt). Nepřetěžovat (snížená odolnost k zátěži a unavitelnost).", "pripad": 5, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.49–50, 53"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u afázie (případ 5)?", "back": "1 Bezpečí + čas (rituál) → 2 Nabídka kanálu (tvorba/AAK) → 3 Vlastní tvorba bez tlaku → 4 Neverbální sdílení → 5 Ocenění PROCESU (↺ stále stejné pořadí). Komunikaci a tvorbu stavět na úspěchu, ne na tlaku — každý zvládnutý kontakt snižuje vyhýbání.", "pripad": 5, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Šicková-Fabrici/Liebmann ⚠️ ověřit; princip Vágnerová STR.49–50"},
  {"front": "Návrh konkrétních technik pro případ 5 (od jednoduchých po náročnější)?", "back": "Progrese: otisky/haptika (zdravá ruka) → volná stopa/ventil → malba „jak se cítím“ → koláž (méně motoriky) → skupinová tvorba po CMP. Tvorba „jak se cítím“ = neverbální sebevyjádření; jednoruční techniky = adaptace na hemiparézu; koláž = komunikace s nižšími nároky na motoriku; tvorba „před a teď“ = zpracování ztráty identity.", "pripad": 5, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 5 — afázie vs demence (případ 4) z pohledu arteterapie?", "back": "AFÁZIE (případ 5) = porucha JEDNÉ funkce (řeči), intelekt zachován → arteterapie staví na zachovaném rozumu a neverbální komunikaci, respektuje klienta jako svéprávného. DEMENCE (případ 4) = úpadek CELÉHO komplexu kognice → arteterapie cílí na aktivizaci, reminiscenci a zpomalení úbytku. Nezaměňovat přístup.", "pripad": 5, "obor": "klientská skupina", "tema": "afázie vs demence", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.49"},
  {"front": "Co je projekce v arteterapii a jak ji u klienta po CMP (případ 5) využít?", "back": "PROJEKCE = promítnutí vnitřního stavu do díla; základ arteterapeutické DIAGNOSTIKY. U afázie je cenná dvojnásob — dílo zpřístupní prožívání (frustrace, ztráta, smutek) tam, kde klient nemůže mluvit. Interpretovat citlivě a ověřovat porozumění (neverbálně/AAK), respektovat zachovaný intelekt.", "pripad": 5, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.49, 53"},
  {"front": "Případ 6 (epilepsie, žena 40 let, zhoršování ke grand mal): jaká je role arteterapie?", "back": "Zpracování ÚZKOSTI a STIGMATU, posílení sebepojetí a VENTIL napětí — NE léčba epilepsie (tu řeší neurologie/medikace). Akcent na proces a (díky zachovanému intelektu) na symbol a reflexi. KLÍČOVÉ: bezpečnost — pozor na fotosenzitivitu (blikání) a bezpečné nástroje; struktura a klid. Arteterapie nenahrazuje medikaci.", "pripad": 6, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.46–47"},
  {"front": "Případ 6: jaká BEZPEČNOSTNÍ specifika má arteterapie u epilepsie?", "back": "1) FOTOSENZITIVITA — vyhnout se blikání, stroboskopu a blikajícím podnětům (mohou provokovat záchvat). 2) BEZPEČNÉ nástroje a materiály — riziko úrazu při grand mal (pád, křeče), tedy opatrně s ostrými/rozbitnými předměty. 3) Nepřetěžovat — přetížení a únava provokují záchvaty. 4) Klidné, strukturované, předvídatelné prostředí.", "pripad": 6, "obor": "arteterapie", "tema": "bezpečnost", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; riziko úrazu/zátěž klinicky Vágnerová STR.46–48"},
  {"front": "Případ 6: proč arteterapie pomáhá (bio·psycho·sociál)?", "back": "BIO: klidná strukturovaná tvorba snižuje napětí; přiměřená zátěž (přetížení/spánkový deficit provokují záchvaty); bezpečnost (žádné blikání). PSYCHO: ventil úzkosti z nepředvídatelného záchvatu a bezmoci, prevence sekundární deprese, posílení sebepojetí. SOCIÁL: sdílení a destigmatizace ve skupině proti izolaci (epilepsie je nápadné, stigmatizující onemocnění).", "pripad": 6, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️; klinicky Vágnerová STR.46–48"},
  {"front": "Jak vést arteterapii u epilepsie (případ 6) — čím se vyznačuje?", "back": "BEZPEČNOST na prvním místě (fotosenzitivita, bezpečné nástroje). VENTIL napětí a úzkosti tvorbou. Práce se SYMBOLEM a REFLEXÍ (intelekt zachován → plnohodnotný reflektivní dialog). STRUKTURA a klid, přiměřená zátěž (unavitelnost). Posílení sebepojetí a destigmatizace. Proces > produkt (nehodnotit esteticky).", "pripad": 6, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.46–48"},
  {"front": "Případ 6: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ s REFLEXÍ (intelekt zachován), INDIVIDUÁLNÍ i SKUPINOVÁ, NEDIREKTIVNÍ, PROCES-orientovaná, STRUKTUROVANÁ, klidná a BEZPEČNÁ. Cíle: ventil úzkosti, zpracování stigmatu, posílení sebepojetí, prevence deprese, kontakt proti izolaci. Návaznost na neurologii (doplněk medikace).", "pripad": 6, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; cíle klinicky Vágnerová STR.46–47"},
  {"front": "Případ 6: čeho se v arteterapii VYVAROVAT?", "back": "Žádné blikání/stroboskop (fotosenzitivita) ani rizikové nástroje. Nepřetěžovat (únava a přetížení provokují záchvaty). Nezlehčovat zhoršování (grand mal) — arteterapie nenahrazuje neurologii a medikaci. Nehodnotit esteticky a nesrovnávat. Nepřičítat negativní vlastnosti/vinu (stigma neurotizuje; uzavřenost je často sekundární).", "pripad": 6, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️; klinicky Vágnerová STR.46–48"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u epilepsie (případ 6)?", "back": "1 Klid + bezpečí (rituál) → 2 Uvolnění napětí → 3 Symbolická tvorba → 4 Reflektivní dialog → 5 Ocenění PROCESU (↺ stále stejné pořadí). Klidné bezpečné prostředí (žádné blikání), přiměřená zátěž, prostor pro ventil a reflexi; arteterapie doplňuje neurologickou léčbu.", "pripad": 6, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Šicková-Fabrici/Slavík ⚠️ ověřit; princip Vágnerová STR.46–48"},
  {"front": "Návrh konkrétních technik pro případ 6 (od jednoduchých po náročnější)?", "back": "Progrese: uvolňující stopa/barva → malba „jak se cítím“ → symbol nemoci/strachu (s reflexí) → modelování → skupinová tvorba (destigmatizace). Uvolňující stopa = ventil napětí; malba úzkosti = vyjádření strachu ze záchvatu; symbol nemoci a zdrojů síly = zpracování stigmatu (zachovaný intelekt); modelování = haptické uvolnění (bezpečné nástroje).", "pripad": 6, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík / Liebmann ⚠️ ověřit"},
  {"front": "Případ 6: proč lze u epilepsie pracovat se symbolem a reflexí (na rozdíl od MR/demence)?", "back": "Většina epileptiků má NORMÁLNÍ inteligenci — výrazná porucha rozumu je výjimka. Proto lze využít plnohodnotný REFLEKTIVNÍ DIALOG, symbolickou tvorbu a vědomé zpracování stigmatu a sebepojetí. U MR (senzomotorická úroveň) a u demence (úpadek kognice) to nelze — tam se symbol interpretuje zdrženlivě.", "pripad": 6, "obor": "artefiletika", "tema": "symbol a reflexe", "zdroj": "arte Slavík ⚠️ ověřit; intelekt klinicky Vágnerová STR.47"},
  {"front": "Co je projekce v arteterapii a jak ji u epilepsie (případ 6) využít?", "back": "PROJEKCE = promítnutí vnitřního stavu (strach ze záchvatu, stud, bezmoc) do díla; základ arteterapeutické DIAGNOSTIKY. U epilepsie (zachovaný intelekt) lze projekci propojit s vědomou reflexí — klientka může své dílo komentovat a zpracovávat úzkost a stigma. Interpretovat ve spolupráci s klientkou, ne za ni.", "pripad": 6, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.46–47"},
  {"front": "Případ 7 (středně těžká nedoslýchavost): jakou roli má arteterapie?", "back": "Arteterapie jako IDEÁLNÍ VIZUÁLNÍ / NEVERBÁLNÍ kanál — obchází KOMUNIKAČNÍ BARIÉRU (nejzávažnější sekundární handicap sluchové vady). Tvorba nevyžaduje sluch ani bohatou slovní zásobu; využívá nedotčený ZRAK a jemnou motoriku. Klíč: chudá slovní zásoba je důsledek vady, NE sníženého intelektu.", "pripad": 7, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 67–68"},
  {"front": "Případ 7: proč arteterapie a na co cílí? (bio·psycho·sociál)", "back": "BIO: využívá NEDOTČENÝ ZRAK a jemnou motoriku (sluch postižen, intelekt a ostatní smysly ne). PSYCHO: běžná komunikace = trvalý STRES → tvorba je komunikace BEZ STRESU, ventil, zážitek úspěchu. SOCIÁL: skupina jako most do kolektivu proti IZOLACI (kontakt nestojí na řeči). POZOR: arte neléčí sluchovou vadu — je podpůrná.", "pripad": 7, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 67–69"},
  {"front": "Jak vést arteterapii u nedoslýchavosti — čím se vyznačuje?", "back": "VIZUÁLNÍ zadání a doprovod: UKÁZAT, ne jen říct; zrakový kontakt, doprovod ZNAKEM / ODEZÍRÁNÍM, obrázkové karty (odezírání je velmi obtížné). Tvorba jako řeč tam, kde vázne slovní zásoba. Reflexe krátce a názorně (gesta, znak, ukazování v díle). KLIDNÉ prostředí (méně únavy z koncentrace). Proces > produkt.", "pripad": 7, "obor": "arteterapie", "tema": "principy u sluchu", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR. 67–68"},
  {"front": "Případ 7: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ tvorba, INDIVIDUÁLNÍ i SKUPINOVÁ, VIZUÁLNĚ VEDENÁ (s doprovodem znaku/odezírání), proces-orientovaná. Cíle: komunikace bez stresu, sebevyjádření a identita bez nároku na sluch, rozvoj pojmů přes tvorbu, začlenění do kolektivu proti izolaci.", "pripad": 7, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR. 67–69"},
  {"front": "Případ 7: čeho se v arteterapii VYVAROVAT?", "back": "Nezaměňovat chudou slovní zásobu za snížený INTELEKT (nesnižovat nároky „jako u MR“). Nemluvit zády / rychle / bez zrakového kontaktu (znemožní odezírání). Nespoléhat jen na verbální instrukce — UKÁZAT. Nevykládat impulzivní reakce jako „drzost“ (komunikační stres). Nehodnotit esteticky; nenechat klienta izolovaného.", "pripad": 7, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 67–69"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u nedoslýchavosti?", "back": "1 Vizuální naladění (ukázat) → 2 Pojem + obraz → 3 Vlastní tvorba → 4 Vizuální sdílení (znak/karty) → 5 Ocenění procesu (↺). Instrukce i sdílení vedeny VIZUÁLNĚ (ukázka, znak, odezírání, obrázky), ne dlouhými větami; klidné prostředí kvůli únavě z koncentrace.", "pripad": 7, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; komunikace klinicky Vágnerová STR. 67–68"},
  {"front": "Návrh konkrétních technik pro případ 7 (jednoduché → náročnější)?", "back": "Progrese: obraz jako sdělení → slovo + obraz (pojmy) → PŘÍBĚH V OBRAZECH / komiks → koláž emocí → společný skupinový projekt. „Řekni to obrazem“ = komunikace bez sluchu; slovníček s obrázky = rozvoj pojmů (s logopedem); komiks = vyprávění bez dlouhých vět; skupinový projekt = most do kolektivu.", "pripad": 7, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík / Liebmann ⚠️ ověřit"},
  {"front": "Případ 7: jak arteterapie rozvíjí pojmy a proč pozor na muzikoterapii?", "back": "Rozvoj POJMŮ přes tvorbu: nové slovo + OBRAZ + vlastní zážitek z tvorby → pojem získá reálný obsah (artefiletický přesah, propojit s logopedií). POZOR: z expresivních terapií je MUZIKOTERAPIE u sluchové vady omezená — vhodnější jsou vizuální a pohybové (drama, tanečně-pohybová přes vibrace/rytmus).", "pripad": 7, "obor": "artefiletika", "tema": "rozvoj pojmů", "zdroj": "Slavík / Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 68"},
  {"front": "Případ 7 vs. 13 — jak se liší arteterapeutický plán? (opačné smyslové modality)", "back": "OPAČNÉ MODALITY → opačné těžiště technik. 7 = SLUCH postižen, ZRAK nedotčen → arte jako ideální VIZUÁLNÍ kanál, doprovod znakem/odezíráním. 13 = ZRAK chybí (praktická slepota) → těžiště v HAPTICE, modelování, struktuře; vizuální techniky nelze. Stejné expresivní médium, jiný vstupní smysl.", "pripad": 7, "obor": "klientská skupina", "tema": "srovnání 7 × 13", "zdroj": "klinicky Vágnerová STR. 65–68; arte ⚠️ ověřit"},
  {"front": "Případ 8 (DMO kvadruparetická, 14 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "Při postižení volní motoriky VŠECH končetin zprostředkuje prožitek AKTÉRSTVÍ a sebevyjádření přes ADAPTOVANOU a ASISTOVANOU tvorbu. BIO: senzomotorika/haptika s pomůckami, bazální stimulace; POZOR napětí zvyšuje spasticitu. PSYCHO: aktérství proti pasivitě, tělesné sebepojetí v adolescenci. SOCIÁL: dílo jako most ke vrstevníkům. POZOR: arteterapie NELÉČÍ DMO (poškození CNS) — je podpůrná.", "pripad": 8, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41–42, 58, 70"},
  {"front": "Případ 8: jak adaptovat tvorbu u kvadruparézy (adaptované pomůcky, asistovaná tvorba)?", "back": "ADAPTOVANÉ POMŮCKY: úchopové úpravy (zesílené násady, fixace štětce), alternativní nástroje (brčko/foukaná barva, válečky). ASISTOVANÁ TVORBA: dopomoc, vedení ruky. Alternativní techniky: otisky s dopomocí, smyslová stimulace. Dílo vzniká „rukou klienta s podporou”.", "pripad": 8, "obor": "arteterapie-technika", "tema": "adaptace a asistence", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41"},
  {"front": "Případ 8: co je prožitek AKTÉRSTVÍ a proč je u asistované tvorby klíčový?", "back": "Aktérství = prožitek „tohle jsem udělala JÁ”. I při PLNÉ dopomoci rozhoduje klientka o barvě, místě, tématu — dílo je „její”. Chrání proti pasivně-receptivnímu postoji a nesamostatnosti. POZOR: asistovaná tvorba ≠ dělat dílo „za klientku” (jinak se aktérství ztrácí).", "pripad": 8, "obor": "arteterapie", "tema": "aktérství", "zdroj": "arte Slavík ⚠️ ověřit; klinicky Vágnerová STR.58"},
  {"front": "Případ 8: proč tvořit KLIDNĚ (spasticita) a jak na to?", "back": "Každý intenzivnější prožitek/napětí se promítá do MOTORIKY → zvýšení spasticity a mimovolních záškubů. Proto: tvořit pomalu, s POLOHOVÁNÍM a relaxací, netlačit a nespěchat. Relaxace a uvolnění snižují napětí a usnadňují pohyb.", "pripad": 8, "obor": "arteterapie", "tema": "spasticita / klid", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41–42"},
  {"front": "Případ 8: jak vést arteterapii u DMO (čím se vyznačuje)?", "back": "Proces > produkt (nehodnotit esteticky). ADAPTOVANÉ pomůcky a ASISTOVANÁ tvorba. KLID a relaxace (napětí zvyšuje spasticitu), polohování. BAZÁLNÍ/multisenzorická stimulace. NEPODCEŇOVAT intelekt (vzhled, vozík a dysartrie ≠ MR) — zadání podle schopností. Aktérství: klientka rozhoduje.", "pripad": 8, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41–43"},
  {"front": "Případ 8: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ, ale ASISTOVANÁ (adaptované pomůcky, dopomoc), individuální i skupinová, NEDIREKTIVNÍ, PROCES-orientovaná, vedená KLIDNĚ (relaxace, polohování). Cíle: prožitek aktérství a sebevyjádření, jemná motorika s dopomocí, snížení spasticity, tělesné sebepojetí v adolescenci, sociální zapojení.", "pripad": 8, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.41–42, 70"},
  {"front": "Případ 8: čeho se v arteterapii VYVAROVAT?", "back": "Nepodceňovat intelekt kvůli vzhledu, vozíku a dysartrii (nehodnotit jako MR). Netlačit a nespěchat (afekt/napětí zvyšují spasticitu). Nedělat dílo „za ni” bez jejího rozhodování (ztráta aktérství). Nehodnotit dílo esteticky a nesrovnávat s vrstevníky. Nepodporovat hyperprotektivitu a vynucenou nesamostatnost.", "pripad": 8, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.42–43"},
  {"front": "Návrh: jak vypadá cyklus arteterapeutického sezení u DMO (asistovaná tvorba)?", "back": "1 Polohování + uvolnění → 2 Smyslové naladění (haptika) → 3 Volba klientky (barva/téma) → 4 Asistovaná tvorba → 5 Ocenění aktérství a procesu (↺). Tvoří se klidně, s polohováním a dopomocí; klientka rozhoduje, dílo je „její”.", "pripad": 8, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte adaptace Šicková-Fabrici ⚠️ ověřit; klid/spasticita klinicky Vágnerová STR.41–42"},
  {"front": "Návrh konkrétních technik pro případ 8 (asistované → samostatnější)?", "back": "Progrese: smyslová/bazální stimulace → otisky s dopomocí → foukaná barva/alternativní nástroj → malba s úchopovou adaptací → společné dílo se skupinou. Otisky dlaní/nohou = vlastní stopa i bez úchopu; foukaná barva/brčko = tvorba bez jemného úchopu; úchopová adaptace = jemná motorika s dopomocí; skupina = sociální zkušenost.", "pripad": 8, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Co je bazální stimulace a proč ji u případu 8 využít?", "back": "BAZÁLNÍ (multisenzorická) stimulace = oslovení smyslů a tělesného vnímání (hmat, struktura, teplota, zrak, sluch) u osob s těžkým tělesným postižením. U kvadruparézy umožní PROŽITEK skrze smysly i tam, kde je přesný pohyb omezený — prožitek místo přesného produktu.", "pripad": 8, "obor": "arteterapie-technika", "tema": "bazální stimulace", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41"},
  {"front": "Případ 9 (Downův syndrom, 11 let): proč právě arteterapie a o co se opírá?", "back": "Nabízí NEVERBÁLNÍ kanál tam, kde je řeč opožděná, a staví na silných stránkách Downa: emoční vřelost, přizpůsobivost, klidné ladění. Akcent na VZTAH, NÁPODOBU a RYTMUS. POZOR: arteterapie NELÉČÍ MR/trizomii (vrozená chromozomální odchylka) — je podpůrná (komunikace, vztah, motorika, radost z tvorby).", "pripad": 9, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.78–81"},
  {"front": "Případ 9: které dělení arteterapie zvolit a proč skupinová?", "back": "PRODUKTIVNÍ (vlastní tvorba), individuální i silně SKUPINOVÁ, ve škole s artefiletickým přesahem. Klient je dobře laděný a sociálně přizpůsobivý → těží ze SKUPINOVÉ arteterapie (sdílení, nápodoba, příslušnost, radost).", "pripad": 9, "obor": "skupinová arteterapie", "tema": "dělení", "zdroj": "arte Liebmann ⚠️ ověřit; klinicky Vágnerová STR.79"},
  {"front": "Jak vést arteterapii u Downova syndromu (čím se vyznačuje)?", "back": "Proces > produkt (nehodnotit esteticky). NEVERBÁLNÍ komunikace na prvním místě (obraz, dotek, obrázkové/AAK karty místo vět). VZTAH a emoční VŘELOST = bezpečí a motivace. NÁPODOBA a RYTMUS (tvorba podle vzoru, opakované pohyby — vyhovuje bradypsychismu). Krátká jasná zadání, stálý rituál, tvorba POD DOHLEDEM.", "pripad": 9, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.79–82"},
  {"front": "Případ 9: na čem v arteterapii STAVĚT (silné stránky Downa)?", "back": "Emoční vřelost a vztah (citová jistota = motivátor) → nápodoba a rytmus (tvorba podle vzoru) → skupinové sdílení (přizpůsobivost, příslušnost) → pochvala PROCESU → haptické techniky s dopomocí. Využít, že klient je klidný, dobře laděný a přizpůsobivý.", "pripad": 9, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.79, 81"},
  {"front": "Případ 9: čeho se v arteterapii VYVAROVAT?", "back": "Nehodnotit dílo esteticky a nesrovnávat děti. Nepřetěžovat a nespěchat (respektovat bradypsychismus a opožděný vývoj). Netlačit na verbální interpretaci (opožděná řeč → obraz/AAK). Nenechávat tvořit samostatně bez dohledu (dítě nepracuje samostatně). Nezaměňovat arteterapii za „výtvarku”.", "pripad": 9, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.79, 80"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u Downova syndromu?", "back": "1 Uvítací rituál (vřelost) → 2 Rytmická haptická rozcvička → 3 Tvorba podle vzoru/nápodoba → 4 Neverbální sdílení ve skupině → 5 Ocenění procesu a radost (↺ stále stejné pořadí). Tvorba POD DOHLEDEM, krátké kroky, akcent na vztah, nápodobu a rytmus.", "pripad": 9, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; stálost/dohled klinicky Vágnerová STR.79, 82–83"},
  {"front": "Návrh konkrétních technik pro případ 9 (od jednoduchých po náročnější)?", "back": "Progrese: otisky/haptika → rytmické čmárání (na hudbu) → malba podle vzoru (nápodoba) → modelování → společná skupinová koláž. Otisky/prstové barvy = senzomotorika a radost; rytmické čmárání = spojení s muzikoterapií; modelování = jemná motorika (opožděný psychomotorický vývoj); koláž = sociální zapojení.", "pripad": 9, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 9: jak v arteterapii nahradit opožděnou řeč (komunikace)?", "back": "NEVERBÁLNÍ sdílení přes dílo + obrázkové/AAK karty místo složitých vět. Propojit s logopedií/AAK. Doteky, gesta a tvorba jako srozumitelnější jazyk; reflektivní dialog jen velmi zjednodušený. Řeč je u Downa postižena obsahově i formálně (agramatismy, méně přesná výslovnost i kvůli velkému jazyku).", "pripad": 9, "obor": "arteterapie", "tema": "neverbální komunikace", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.80"},
  {"front": "Co je projekce v arteterapii a jak ji u Downova syndromu interpretovat?", "back": "PROJEKCE = promítnutí vnitřního stavu a prožívání do díla; základ arteterapeutické DIAGNOSTIKY. U Downa (MR na hranici lehčí–středně těžké) interpretovat ZDRŽENLIVĚ — nepřeceňovat symboliku, respektovat senzomotorickou úroveň a opožděnou řeč.", "pripad": 9, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.79"},
  {"front": "Případ 10 (poruchy příjmu potravy, 19 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "BIO: práce s TĚLOVÝM SCHÉMATEM/body image přes obraz a hmotu — konfrontace zkreslené představy „jsem tlustá” s realitou. PSYCHO: vyjádření emocí (úzkost, vina) + pole, kde NELZE SELHAT (proces > produkt) jako protilék na perfekcionismus a kontrolu. SOCIÁL: skupina proti izolaci (sdílení, ne soutěž), hodnota nezávislá na vzhledu. POZOR: arte je DOPLNĚK, ne náhrada léčby (somatické riziko ohrožuje život).", "pripad": 10, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.120, 122–124, 126"},
  {"front": "Případ 10: které dělení arteterapie zvolit a proč skupina bez soutěže?", "back": "PRODUKTIVNÍ (vlastní tvorba), individuální i SKUPINOVÁ, terapeuticky arteterapie jako součást léčby. Skupina proto, že klientka se postupně IZOLUJE od vrstevníků → sdílení a příslušnost; ale BEZ soutěže a srovnávání těl (to by živilo perfekcionismus a body image patologii).", "pripad": 10, "obor": "skupinová arteterapie", "tema": "dělení", "zdroj": "arte Liebmann ⚠️ ověřit; klinicky Vágnerová STR.123"},
  {"front": "Proč je u poruch příjmu potravy zásada „proces > produkt” ZVLÁŠŤ důležitá?", "back": "Protože jádrem osobnosti u PPP je PERFEKCIONISMUS, vysoké aspirace a nízké sebevědomí navzdory výkonu. Kdyby se dílo hodnotilo esteticky, živilo by to „musím být dokonalá”. Arteterapie naopak nabízí pole, kde NELZE SELHAT — odnaučuje vázat sebeúctu na výkon a vzhled.", "pripad": 10, "obor": "arteterapie", "tema": "proces vs. produkt", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; perfekcionismus klinicky Vágnerová STR.123"},
  {"front": "Jak vést arteterapii u PPP (čím se vyznačuje)?", "back": "Proces > produkt ZVLÁŠŤ důsledně (perfekcionismus). Práce s TĚLESNÝM SCHÉMATEM (obrys těla, autoportrét) — realita vs. zkreslení. Vyjádření EMOCÍ bez slov (úzkost, vina, vztek na sebe), pak teprve reflexe. Bezpečí, nedirektivnost, žádná soutěž ani srovnávání těl (respekt k popírání). DOPLNĚK k lékařské péči a psychoterapii, ne náhrada.", "pripad": 10, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.120, 122–124, 126"},
  {"front": "Případ 10: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ, individuální i skupinová, NEDIREKTIVNÍ, důsledně PROCES-orientovaná (perfekcionismus), jako DOPLNĚK komplexní léčby (lékař + psychoterapie + výživa). Cíle: práce s tělovým schématem/body image, vyjádření emocí, oslabení perfekcionismu a potřeby kontroly, SEBEPŘIJETÍ mimo vzhled a výkon.", "pripad": 10, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.120, 123–124, 126"},
  {"front": "Případ 10: čeho se v arteterapii VYVAROVAT?", "back": "Nehodnotit dílo esteticky a nesrovnávat klienty (u perfekcionismu obzvlášť škodí). NENAHRAZOVAT arteterapií lékařskou péči (život ohrožující somatické riziko). Neapelovat na vůli a nebagatelizovat („móda”). NECHVÁLIT hubnutí ani „pevnou vůli” (posilující impulz poruchy). Nezařazovat soutěž a srovnávání těl ve skupině.", "pripad": 10, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.123, 126"},
  {"front": "Návrh: jak vypadá cyklus jednoho arteterapeutického sezení u PPP?", "back": "1 Naladění (bezpečí) → 2 Volná tvorba BEZ zadání výsledku → 3 Téma (tělo/emoce) → 4 Reflektivní dialog BEZ hodnocení → 5 Ocenění PROCESU (↺). Důraz na to, že NELZE SELHAT (proces > produkt) jako protilék na perfekcionismus; tělo a emoce jako témata, reflexe bez hodnocení.", "pripad": 10, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; psych. jádro klinicky Vágnerová STR.120, 123–124"},
  {"front": "Návrh konkrétních technik pro případ 10 (bezpečné → konfrontační)?", "back": "Progrese: barva nálady/volná stopa → modelování z hlíny (kontakt s tělem) → OBRYS TĚLA v životní velikosti → autoportrét (jak se vidím × jak mě vidí druzí) → koláž „kdo jsem mimo vzhled”. Obrys těla a autoportrét = práce s narušeným tělovým schématem; koláž = identita nezávislá na vzhledu a výkonu.", "pripad": 10, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík ⚠️ ověřit; tělové schéma klinicky Vágnerová STR.120, 122"},
  {"front": "Co je projekce/diagnostika v arteterapii u PPP a na co dát pozor?", "back": "PROJEKCE = promítnutí vztahu k tělu a emocí do díla (základ arteterapeutické diagnostiky). U PPP se v tvorbě často zrcadlí NARUŠENÉ TĚLOVÉ SCHÉMA (deformované proporce postavy) a potřeba kontroly. Interpretovat OPATRNĚ a vždy v týmu — arte nenahrazuje psychiatrickou diagnostiku ani somatické vyšetření.", "pripad": 10, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; tělové schéma klinicky Vágnerová STR.120, 122"},
  {"front": "Případ 10 vs. 11: čím se liší arteterapie u PPP a u poruch chování (oba emoční/rodina)?", "back": "Společné: psychogenní/emoční jádro a klíčová role DYSFUNKČNÍ RODINY. Rozdíl: u PPP (10) arte pracuje s VZTAHEM K TĚLU, perfekcionismem a sebepřijetím (kontrola, ne agrese) — proces > produkt zvlášť důležité. U poruch chování (11) je arte VENTIL AGRESE a zpracování traumatu. PPP je navíc psychiatrická porucha (arte = doplněk léčby).", "pripad": 10, "obor": "klientská skupina", "tema": "diferenciace", "zdroj": "klinicky Vágnerová STR.124; srovnání napříč kazuistikami"},
  {"front": "Případ 11 (poruchy chování na pozadí týrání, 9 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "BIO: tělesné ODREAGOVÁNÍ napětí a agrese přijatelnou formou (rytí, trhání, hnětení). PSYCHO: bezpečný VENTIL agrese + SYMBOLICKÉ zpracování traumatu přes obraz (ne přímo slovy), posílení sebehodnocení proti roli „špatného dítěte”. SOCIÁL: obnova DŮVĚRY přes bezpečný vztah (kompenzační zkušenost). POZOR: vždy AŽ PO zajištění bezpečí (řešit týrání — OSPOD).", "pripad": 11, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.180–183"},
  {"front": "Případ 11: které dělení arteterapie zvolit a proč nejdřív individuálně?", "back": "PRODUKTIVNÍ (vlastní tvorba), NEJPRVE INDIVIDUÁLNÍ → skupina až později, terapeuticky arteterapie (zpracování traumatu). Individuálně proto, že dítě má GENERALIZOVANOU NEDŮVĚRU (čeká ublížení i od neutrálních osob) → nejdřív je třeba trpělivě vybudovat bezpečný vztah, teprve pak zvládne skupinu.", "pripad": 11, "obor": "arteterapie", "tema": "dělení", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.183"},
  {"front": "Jak vést arteterapii u poruch chování na pozadí týrání (čím se vyznačuje)?", "back": "NEJDŘÍV BEZPEČÍ, pak terapie (řešit týrání — OSPOD; jinak jen příznak). Bezpečný VENTIL agrese (rytí, trhání, hnětení). SYMBOLICKÉ zpracování traumatu přes obraz/hru, NE přímým vyptáváním. Budování důvěry, nedirektivnost. Jasné hranice BEZ NÁSILÍ. POZOR na RE-TRAUMATIZACI — respektovat tempo, nevynucovat odhalení.", "pripad": 11, "obor": "arteterapie", "tema": "principy", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR.150, 180–183"},
  {"front": "Případ 11: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ, nejprve individuální, NEDIREKTIVNÍ, proces-orientovaný, s jasnými hranicemi BEZ NÁSILÍ. Cíle: bezpečný VENTIL AGRESE, SYMBOLICKÉ zpracování traumatu, OBNOVA DŮVĚRY, posílení sebehodnocení (proti roli „špatného dítěte”). Vše AŽ PO zajištění bezpečí dítěte.", "pripad": 11, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle a bezpečí klinicky Vágnerová STR.150, 180–183"},
  {"front": "Případ 11: čeho se v arteterapii VYVAROVAT?", "back": "Nevykládat chování jako „nevychovanost”/zlobení (je to důsledek týrání). ŽÁDNÉ tresty ani tvrdá disciplína (posilují agresi a model násilí). POZOR na RE-TRAUMATIZACI — nevynucovat odhalení traumatu. Nepřehlížet týrání (ohlašovací povinnost). Nehodnotit dílo esteticky a nepotvrzovat negativní sebepojetí (kritika, ponižování).", "pripad": 11, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.150, 180–183"},
  {"front": "Návrh: jak vypadá cyklus jednoho arteterapeutického sezení u dítěte s CAN/poruchou chování?", "back": "1 Bezpečné naladění (rituál) → 2 VENTIL napětí (rytí/hnětení) → 3 Volná/symbolická tvorba → 4 Sdílení v bezpečí BEZ tlaku → 5 Ocenění + pečlivé UZAVŘENÍ (↺). Stálý bezpečný rituál, nejdřív vybít napětí, pak symbolická tvorba; důsledné uzavření sezení kvůli prevenci re-traumatizace.", "pripad": 11, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; bezpečí/důvěra klinicky Vágnerová STR.183"},
  {"front": "Návrh konkrétních technik pro případ 11 (ventil → zpracování)?", "back": "Progrese: rytí/trhání/hnětení (ventil agrese) → čmárání „zlost × klid” (regulace emocí) → kresba „bezpečného místa” (jistota) → symbolický příběh/loutka (zpracování traumatu v bezpečné vzdálenosti) → koláž „kdo jsem / co umím” (sebehodnocení). Trauma se zpracovává SYMBOLICKY, ne přímým vyptáváním.", "pripad": 11, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Slavík ⚠️ ověřit; symbolika rámcově Vágnerová STR.182"},
  {"front": "Případ 11: co je re-traumatizace a jak jí v arteterapii předejít?", "back": "RE-TRAUMATIZACE = znovuprožití traumatu, když je téma otevřeno necitlivě nebo příliš rychle. Prevence: pracovat SYMBOLICKY (obraz/hra, ne přímé vyptávání), respektovat TEMPO dítěte, nevynucovat odhalení, sledovat reakce, pečlivě uzavírat sezení a vrátit dítě do bezpečí. Nejdřív musí být zajištěno reálné bezpečí (ukončené týrání).", "pripad": 11, "obor": "arteterapie", "tema": "re-traumatizace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; bezpečí klinicky Vágnerová STR.180–181, 183"},
  {"front": "Co je projekce/diagnostika v arteterapii u dítěte s CAN a na co dát pozor?", "back": "PROJEKCE = promítnutí traumatu, agrese a strachu do díla → symbolické odreagování i základ diagnostiky. U týraného dítěte se mohou objevit témata násilí, ohrožení, „špatného dítěte”. Interpretovat OPATRNĚ a v týmu; dílo není důkaz ani výslech — slouží bezpečnému vyjádření, ne k vynucení přiznání. Nález podezření na týrání → ohlašovací povinnost.", "pripad": 11, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; CAN klinicky Vágnerová STR.180, 182"},
  {"front": "Případ 11 vs. 15 a 10: čím se liší arteterapeutická optika?", "back": "11 a 15 sdílejí jádro TRAUMA / TÝRÁNÍ (CAN) → priorita BEZPEČÍ a obnovy DŮVĚRY, symbolické zpracování (u 15 navíc tělesná vada a sebepřijetí vzhledu). Oproti tomu u PPP (10) jde také o emoční/rodinné jádro, ale arte pracuje s VZTAHEM K TĚLU a KONTROLOU (perfekcionismus), ne s ventilací agrese. U 11 je klíčový bezpečný VENTIL AGRESE.", "pripad": 11, "obor": "klientská skupina", "tema": "diferenciace", "zdroj": "klinicky Vágnerová STR.182–183; srovnání napříč kazuistikami"},
  {"front": "Případ 12 (DMO + kombinované postižení, 12 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "Na NEJTĚŽŠÍ úrovni (kvadruparéza + strabismus + epilepsie + dysartrie + autistické projevy) nabízí MULTISENZORICKÝ kanál tam, kde selhává řeč i přesný pohyb. BIO: bazální stimulace (hmat/světlo/zvuk); POZOR spasticita a bezpečí kvůli epilepsii. PSYCHO: prožitek a kontakt místo výkonu, struktura a klid. SOCIÁL: neverbální kontakt s terapeutem. POZOR: arteterapie NELÉČÍ postižení — je podpůrná.", "pripad": 12, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41–42, 46–47"},
  {"front": "Případ 12: proč PROŽITEK místo produktu a co to znamená v praxi?", "back": "Na nejtěžší úrovni se NEČEKÁ „dílo” — léčebně účinný je SMYSLOVÝ PROŽITEK a KONTAKT, ne výsledek. Nehodnotit esteticky, nepřeceňovat symboliku. Cílem sezení je oslovit smysly, navázat kontakt a dát strukturu/klid, ne vytvořit obrázek.", "pripad": 12, "obor": "arteterapie", "tema": "prožitek místo produktu", "zdroj": "arte Šicková-Fabrici/Slavík ⚠️ ověřit; klinicky Vágnerová STR.42"},
  {"front": "Případ 12: co je bazální a multisenzorická tvorba a jak ji vést?", "back": "BAZÁLNÍ stimulace = oslovení základního smyslového a tělesného vnímání u nejtěžšího postižení. MULTISENZORICKÁ tvorba = zapojení více smyslů (hmat, zrak — kontrast kvůli strabismu, sluch, čich). Vrstvit smyslové podněty; výborně se propojuje s muzikoterapií (zvuk, vibrace).", "pripad": 12, "obor": "arteterapie-technika", "tema": "bazální / multisenzorická", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.42"},
  {"front": "Případ 12: co znamená PLNÁ dopomoc a jak zachovat volbu klienta?", "back": "PLNÁ dopomoc = tvorbu zcela vede ruka terapeuta. Klient přesto SPOLUROZHODUJE — reakcí a výběrem podnětu (barva, materiál, směr). Tím se i při úplné dopomoci zachová prožitek aktérství a kontakt; nejde o pasivní „dělání za něj”.", "pripad": 12, "obor": "arteterapie", "tema": "plná dopomoc", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41"},
  {"front": "Případ 12: jak v arteterapii zajistit BEZPEČÍ kvůli epilepsii?", "back": "Klidné, PŘEDVÍDATELNÉ prostředí; pozor na spouštěče (blikání/světelné efekty). Sledovat ÚNAVU a útlum PO ZÁCHVATU — nezaměňovat za nezájem/lenost. Krátké jednotky kvůli kolísavé aktivační úrovni. Epilepsii nepodceňovat ani nestigmatizovat.", "pripad": 12, "obor": "arteterapie", "tema": "bezpečí / epilepsie", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.46–47"},
  {"front": "Případ 12: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: BAZÁLNÍ/multisenzorická arteterapie, převážně INDIVIDUÁLNÍ, s PLNOU dopomocí, NEDIREKTIVNÍ, PROŽITEK-orientovaná, vedená KLIDNĚ a BEZPEČNĚ (epilepsie). Cíle: smyslový prožitek, kontakt, struktura a klid, regulace, prevence izolace.", "pripad": 12, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; cíle klinicky Vágnerová STR.41–42, 46–47"},
  {"front": "Případ 12: čeho se v arteterapii VYVAROVAT?", "back": "Nečekat „dílo” ani je nehodnotit esteticky. Nepodceňovat intelekt (dysartrie/záškuby ≠ MR) a NEOZNAČIT autistické projevy jako PAS bez dif. dg. Nepodceňovat epilepsii (spouštěče, útlum ≠ nezájem). Netlačit a nespěchat (spasticita, kolísavá aktivace). Nepřeceňovat symboliku díla.", "pripad": 12, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41–43, 46–47"},
  {"front": "Návrh: jak vypadá cyklus arteterapeutického sezení u kombinovaného postižení?", "back": "1 Bezpečí + polohování → 2 Smyslové oslovení (hmat/světlo/zvuk) → 3 Volba podnětu klientem → 4 Tvorba s plnou dopomocí → 5 Zklidnění a kontakt (↺). Krátce, klidně, bezpečně; cílem je smyslový prožitek a kontakt, ne produkt.", "pripad": 12, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte bazální struktura Šicková-Fabrici ⚠️ ověřit; bezpečí/klid klinicky Vágnerová STR.42, 46–47"},
  {"front": "Návrh konkrétních technik pro případ 12 (smyslové → s dopomocí)?", "back": "Progrese: hmatové materiály → světlo a kontrast → zvuk/vibrace (muzikoterapie) → otisky s plnou dopomocí → malba vedená rukou terapeuta. Hmatová stimulace = prožitek bez nároku na pohyb; světlo/kontrast = zrakové oslovení (strabismus); zvuk/vibrace = propojení s muzikoterapií; malba vedená rukou = klient volí barvu/podnět.", "pripad": 12, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 12: jak se liší arteterapie u kombinovaného postižení od „čisté” DMO (případ 8)?", "back": "Případ 12 (nejtěžší, kombinované): BAZÁLNÍ/multisenzorická tvorba, PLNÁ dopomoc, prožitek místo produktu, převážně individuálně, bezpečí kvůli epilepsii. Případ 8 (kvadruparéza, „čistší”): ASISTOVANÁ PRODUKTIVNÍ tvorba s adaptovanými pomůckami, větší prostor pro aktérství a skupinu. Klíč: arteterapie je SOUČÁSTÍ koordinovaného týmu, ne izolovaná aktivita.", "pripad": 12, "obor": "klientská skupina", "tema": "srovnání 12 × 8", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.41"},
  {"front": "Případ 13 (praktická slepota, sociální stažení): jakou roli má arteterapie?", "back": "Arteterapie BEZ ZRAKU → silně adaptovaná, HAPTICKÁ a multisenzorická (modelování, reliéf, struktura, vůně, zvuk). Dvojí cíl: rozvoj KOMPENZACE hmatem + přes SKUPINU překonat sociální stažení. Klíč: vizuální kvalita je IRELEVANTNÍ (proces > produkt); stažení = obranný postoj, ne porucha osobnosti.", "pripad": 13, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 53, 65–66"},
  {"front": "Případ 13: proč arteterapie a na co cílí? (bio·psycho·sociál)", "back": "BIO: cílený rozvoj HMATU a sluchu jako kompenzace (výsledek učení, ne vrozená); modelování v haptickém prostoru. PSYCHO: zážitek úspěchu (VŠ předpoklady), pojmy s reálným obsahem proti VERBALISMU. SOCIÁL: skupina = drobné úspěšné kontakty proti stažení (navíc zraková vada je NEJMÉNĚ odmítané postižení). POZOR: arte neléčí zrakovou vadu.", "pripad": 13, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 53, 65–67"},
  {"front": "Jak vést arteterapii u praktické slepoty — čím se vyznačuje?", "back": "BEZ ZRAKU, přes HMAT (modelování, reliéf, struktura, materiály s texturou). MULTISENZORICKY (vůně, zvuk materiálů). Instrukce POPSAT slovy a VÉST RUKAMA (učení nápodobou je omezené); předměty osahat. Proti VERBALISMU dávat pojmům reálný hmatový obsah. STABILNÍ rozmístění materiálů (orientace hmatem/pamětí). Skupina po malých krocích.", "pripad": 13, "obor": "arteterapie", "tema": "principy u slepoty", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR. 65–66"},
  {"front": "Případ 13: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ, HAPTICKÁ / multisenzorická, SKUPINOVÁ i individuální, proces-orientovaná. Cíle: rozvoj kompenzace hmatem, pojmy s reálným obsahem proti verbalismu, zážitek úspěchu a sebepojetí, a přes skupinu PŘEKONÁNÍ SOCIÁLNÍHO STAŽENÍ.", "pripad": 13, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR. 53, 65–67"},
  {"front": "Případ 13: čeho se v arteterapii VYVAROVAT?", "back": "NESTAVĚT NA ZRAKU — žádné „nakresli, jak to vidíš“ (vizuální kvalita irelevantní). Nevykládat stažení jako poruchu osobnosti ani „nezájem“ (je to obranný postoj). Nepodceňovat intelekt (VŠ studentka). Nepřebírat za ni vše („nechat se vodit“ → posiluje izolaci). Nespoléhat na slova bez obsahu (verbalismus); netlačit do skupiny nátlakem.", "pripad": 13, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 53, 65–67"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u praktické slepoty?", "back": "1 Naladění (osahat materiály) → 2 Hmatová rozcvička → 3 Haptická tvorba → 4 Sdílení hmatem + slovem → 5 Ocenění procesu (↺). Vše vedeno HMATEM a SLOVEM (ne zrakem), stálé rozmístění materiálů pro orientaci; dílo se vnímá a sdílí hmatem.", "pripad": 13, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; kompenzace klinicky Vágnerová STR. 65–66"},
  {"front": "Návrh konkrétních haptických technik pro případ 13 (jednoduché → náročnější)?", "back": "Progrese: hmatová rozcvička → MODELOVÁNÍ (hlína) → RELIÉF / struktura → multisenzorická koláž (textura, vůně, zvuk) → společné prostorové dílo. „Pojem hmatem“ = reálný obsah proti verbalismu; sdílení hmatem (prozkoumat dílo druhého rukama) = kontakt bez zraku.", "pripad": 13, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Případ 13: jak arteterapie bojuje s verbalismem a sociálním stažením?", "back": "VERBALISMUS (pojmy bez reálného obsahu — barvy, krajina): tvorba dává pojmům REÁLNÝ HMATOVÝ obsah (ztvárnit pojem hmatem). STAŽENÍ (postojový stereotyp „nepřijímají mě“): skupinová arteterapie nabízí řadu drobných ÚSPĚŠNÝCH kontaktů, které stereotyp vyvracejí — bez nátlaku, po malých krocích.", "pripad": 13, "obor": "skupinová arteterapie", "tema": "verbalismus / stažení", "zdroj": "arte Slavík / Liebmann ⚠️ ověřit; klinicky Vágnerová STR. 53, 66"},
  {"front": "Případ 13 vs. 7 — jak se liší arteterapeutický plán? (opačné smyslové modality)", "back": "OPAČNÉ MODALITY → opačné těžiště technik. 13 = ZRAK chybí (praktická slepota) → arteterapie přes HMAT (modelování, reliéf, struktura, vůně, zvuk); vizuální techniky nelze. 7 = SLUCH postižen, zrak nedotčen → arte jako ideální VIZUÁLNÍ kanál, doprovod znakem/odezíráním. Stejné expresivní médium, jiný vstupní smysl.", "pripad": 13, "obor": "klientská skupina", "tema": "srovnání 13 × 7", "zdroj": "klinicky Vágnerová STR. 65–68; arte ⚠️ ověřit"},
  {"front": "Případ 14 (paraplegie po úraze, 43 let): proč právě arteterapie? (bio·psycho·sociál)", "back": "Jde o ZÍSKANÉ (poúrazové) postižení → arteterapie dává bezpečný prostor pro ZPRACOVÁNÍ ZTRÁTY, ventil emocí a obnovu identity. BIO: HORNÍ KONČETINY ZACHOVÁNY → plná klasická tvorba. PSYCHO: ventil agrese/hořkosti, obnova rozbité identity, nový smysl. SOCIÁL: odvedení agrese od rodiny/personálu do díla, skupina vozíčkářů (vzory). POZOR: arteterapie NELÉČÍ paraplegii — je podpůrná.", "pripad": 14, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.57, 61–62"},
  {"front": "Případ 14: proč jsou u paraplegie možné KLASICKÉ výtvarné techniky?", "back": "Protože HORNÍ KONČETINY jsou ZACHOVÁNY — na rozdíl od kvadruparézy (případy 8, 12) není třeba zásadních adaptací ani plné dopomoci. Lze plnohodnotnou kresbu, malbu, modelování, práci s hmotou; náročnost přiměřená dospělému. Klient tvoří SÁM (nevmanipulovat do role bezmocného).", "pripad": 14, "obor": "arteterapie-technika", "tema": "klasické techniky", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.57, 70"},
  {"front": "Případ 14: jak v arteterapii pracovat se ZTRÁTOU a obnovou identity?", "back": "Získané postižení rozbíjí identitu → tematická tvorba o tom, co bylo / co je / co může být. Respektovat FÁZE adaptace (latence → šok/popření → adaptace). Nevnucovat „pozitivní” témata a nepopírat ztrátu — nejdřív prostor pro těžké emoce, pak most k novému smyslu. Dát čas jako u somatické rehabilitace.", "pripad": 14, "obor": "arteterapie", "tema": "zpracování ztráty", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.61–62"},
  {"front": "Případ 14: jak v arteterapii naložit s AGRESÍ klienta?", "back": "Slovní agrese a obviňování okolí je FÁZE vyrovnávání se ztrátou, NE charakterová vada. Terapeut ji PŘIJÍMÁ klidně, NEBERE osobně, netrestá. Tvorba slouží jako bezpečný VENTIL — zlost a hořkost jdou do díla, ne na rodinu a personál. To chrání vztahy.", "pripad": 14, "obor": "arteterapie", "tema": "agrese jako ventil", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.62"},
  {"front": "Případ 14: které dělení arteterapie zvolit a proč nejdřív individuální?", "back": "PRODUKTIVNÍ (klasické techniky, ruce zachovány). Nejdřív INDIVIDUÁLNÍ — zpracování silných emocí a ztráty v bezpečí; pak SKUPINOVÁ s vozíčkáři (peer/vzory, naděje, nadhled). Jednoznačně ARTETERAPIE (terapeutický cíl — krize), ne artefiletika.", "pripad": 14, "obor": "skupinová arteterapie", "tema": "dělení", "zdroj": "arte Liebmann ⚠️ ověřit; klinicky Vágnerová STR.61"},
  {"front": "Případ 14: který arteterapeutický přístup zvolit a jaké cíle?", "back": "Přístup: PRODUKTIVNÍ (klasické techniky), nejdřív INDIVIDUÁLNÍ, pak SKUPINOVÁ (vozíčkáři), NEDIREKTIVNÍ, PROCES-orientovaná. Cíle: ventil emocí (agrese, hořkost), zpracování ztráty a obnova identity, hledání nového smyslu, posílení RESILIENCE.", "pripad": 14, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR.61–62, 73"},
  {"front": "Případ 14: čeho se v arteterapii VYVAROVAT?", "back": "Nebrat agresi osobně a netrestat ji (je to fáze vyrovnávání). Nehodnotit dílo esteticky a nesrovnávat. Nevmanipulovat do role bezmocného přehnanou péčí/dopomocí (ruce fungují — tvoří sám). Nevnucovat „pozitivní” témata a nepopírat ztrátu. Nepřehlížet riziko deprese a posttraumatického stresu.", "pripad": 14, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.61–62"},
  {"front": "Návrh: jak vypadá cyklus arteterapeutického sezení u získaného postižení (ztráta)?", "back": "1 Přijetí naladění (i agrese) → 2 Bezpečí a téma → 3 Vlastní tvorba (ventil) → 4 Reflektivní sdílení → 5 Most k novému smyslu (↺). Agrese se přijímá jako signál fáze vyrovnávání; tvorba je ventil i most k obnově identity — dát čas jako u somatické rehabilitace.", "pripad": 14, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Šicková-Fabrici/Liebmann ⚠️ ověřit; fáze klinicky Vágnerová STR.61–62"},
  {"front": "Návrh konkrétních technik pro případ 14 (ventil → integrace)?", "back": "Progrese: expresivní čmárání/ventil → malba emocí (zlost/smutek) → téma „co jsem ztratil” → modelování/práce s hmotou → téma „nový směr/smysl”. Expresivní čmárání = ventil zlosti do díla; malba emocí = zpracování těžkých pocitů; „má cesta”/před a po úraze = identita; „nový směr” = hledání smyslu; skupina vozíčkářů = naděje a resilience.", "pripad": 14, "obor": "arteterapie-technika", "tema": "techniky", "zdroj": "Šicková-Fabrici / Liebmann ⚠️ ověřit"},
  {"front": "Co je projekce v arteterapii a jak ji u případu 14 využít?", "back": "PROJEKCE = promítnutí vnitřního stavu (hořkosti, zlosti, smutku ze ztráty) do díla; základ arteterapeutické DIAGNOSTIKY i ventilu. U získaného postižení umožní bezpečně vyjádřit a zpracovat emoce kolem traumatu a přijmout změněnou identitu. Interpretovat citlivě, navázat na hledání nového smyslu.", "pripad": 14, "obor": "arteterapie-diagnostika", "tema": "projekce", "zdroj": "Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR.62"},
  {"front": "Případ 15 (rozštěp páteře + týrání, syndrom CAN): jakou roli má arteterapie?", "back": "Arteterapie jako BEZPEČNÝ KANÁL pro NEVYSLOVITELNÉ — obraz a hmota unesou trauma z týrání, na které dítě nemá nebo se neodváží mít slova. Klíč: BEZPEČÍ, předvídatelný RITUÁL a spolehlivý terapeutický VZTAH. POZOR na RE-TRAUMATIZACI — trauma se nevyvolává, klient určuje hloubku.", "pripad": 15, "obor": "arteterapie", "tema": "indikace", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 181–182"},
  {"front": "Případ 15: proč arteterapie a na co cílí? (bio·psycho·sociál)", "back": "BIO: náhradní bezpečný kanál pro napětí místo SEBEPOŠKOZOVÁNÍ; jemná motorika i přes omezení DK. PSYCHO: vyjádření strachu/hněvu/viny bez slov, zážitek kontroly proti roli „špatného dítěte“ a negativnímu sebehodnocení. SOCIÁL: bezpečný vztah jako protiklad patologické vazby na týrajícího otce → obnova důvěry. POZOR: arte neodstraní vadu ani „nevymaže“ týrání.", "pripad": 15, "obor": "arteterapie", "tema": "bio·psycho·sociál", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 70, 182–183"},
  {"front": "Jak vést arteterapii u týraného dítěte (CAN) — čím se vyznačuje?", "back": "BEZPEČÍ především (nejdřív ochrana — OSPOD — pak terapie). NEDIREKTIVNÍ doprovázení (direktiva hrozí re-traumatizací). Klient určuje TÉMA i HLOUBKU. Proces > produkt (nehodnotit esteticky — posílilo by přecitlivělost). PŘEDVÍDATELNOST a stálost (rituál, materiál, terapeut) léčí narušenou důvěru. Trpělivost se vztahovačností.", "pripad": 15, "obor": "arteterapie", "tema": "principy u traumatu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; klinicky Vágnerová STR. 181–183"},
  {"front": "Případ 15: který arteterapeutický přístup zvolit a jaké cíle?", "back": "PRODUKTIVNÍ tvorba, NEJDŘÍV INDIVIDUÁLNÍ (skupina až po stabilizaci důvěry), NEDIREKTIVNÍ, proces-orientovaná, PŘEDVÍDATELNÁ a strukturovaná. Cíle: bezpečné vyjádření traumatu, obnova důvěry a sebehodnocení, ventil napětí místo sebepoškozování. Vždy spolu se zajištěním bezpečí dítěte.", "pripad": 15, "obor": "arteterapie", "tema": "volba přístupu", "zdroj": "arte Šicková-Fabrici/Liebmann ⚠️ ověřit; cíle klinicky Vágnerová STR. 181–183"},
  {"front": "Případ 15: čeho se v arteterapii VYVAROVAT?", "back": "Nevyvolávat trauma direktivním zadáním ani „rozborem“ díla (RE-TRAUMATIZACE). Nehodnotit dílo esteticky (posiluje přecitlivělost a očekávání neúspěchu). Netlačit na verbalizaci. Nereagovat ODMÍTNUTÍM na vztahovačnost a testování (je to obrana). Nestavět terapii bez zajištění bezpečí.", "pripad": 15, "obor": "arteterapie", "tema": "chyby", "zdroj": "arte Šicková-Fabrici ⚠️ ověřit; klinicky Vágnerová STR. 182–183"},
  {"front": "Návrh: cyklus jednoho arteterapeutického sezení u týraného dítěte?", "back": "1 Naladění (bezpečný rituál) → 2 Uvolnění napětí → 3 Volná tvorba (klient vede) → 4 Sdílení dle ochoty → 5 Zklidnění a ocenění (↺). Stálý předvídatelný rituál; tempo i hloubku určuje klient; po vyjádření napětí VŽDY zklidnění a uzavření.", "pripad": 15, "obor": "arteterapie-technika", "tema": "cyklus sezení", "zdroj": "arte struktura Liebmann ⚠️ ověřit; bezpečí klinicky Vágnerová STR. 181–183"},
