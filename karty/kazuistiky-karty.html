  {"front": "Triáda PAS u nízkofunkčního autismu — jak vypadá?", "back": "Triáda = sociální interakce + komunikace + stereotypní chování. U nízkofunkční formy je nejtěžší porucha KOMUNIKACE a porozumění (rozumí jen pár slovům) + výrazné stereotypie/autostimulace + snížené rozumové schopnosti.", "pripad": 18, "obor": "speciální pedagogika osob s PAS", "tema": "projevy / triáda", "zdroj": "Vágnerová STR.84–86"},
  {"front": "Případ 18: co znamená „narušené sluchové vnímání\" u autismu (KLÍČOVÉ)?", "back": "NENÍ to periferní hluchota! Jde o poruchu CENTRÁLNÍHO zpracování (dysgnózie). Dítě sluch má velmi dobře rozvinutý, přesně diferencuje zvuky, ALE neodlišuje zvuky řečové od jiných a nedekóduje význam slov. Proto slyší na jméno, ale nerozumí slovům.", "pripad": 18, "obor": "speciální pedagogika osob s PAS", "tema": "diferenciace", "zdroj": "Vágnerová STR.85"},
  {"front": "Jaké jsou příčiny PAS / nízkofunkčního autismu (a jaký mýtus vyvrátit)?", "back": "Vrozená neurovývojová porucha — ORGANICKÉ postižení mozku, převážně GENETICKÉ předurčení; faktory prostředí nehrají podstatnou roli. U nízkofunkční formy + snížené rozumové schopnosti (MR). POZOR: teorie „chladné matky\" (Bettelheim) je VYVRÁCENÝ mýtus!", "pripad": 18, "obor": "speciální pedagogika osob s PAS", "tema": "etiologie", "zdroj": "Vágnerová STR.84, 86"},
  {"front": "Nízkofunkční autismus × periferní sluchové postižení × MR — jak odlišit?", "back": "Nízkofunkční autismus: slyší, ale centrální zpracování narušeno (dysgnózie), plná triáda, často + MR. Periferní sluchové postižení: narušen příjem zvuku uchem, ale zájem o kontakt a komunikaci zachován. MR (bez autismu): sluch v normě, vztah k blízké osobě vzniká.", "pripad": 18, "obor": "speciální pedagogika osob s PAS", "tema": "diferenciace", "zdroj": "Vágnerová STR.77, 82, 85; kap.8.5"},
  {"front": "Terapie nízkofunkčního autismu — čeho se VYVAROVAT?", "back": "Nezaměnit za periferní hluchotu (zesílení zvuku nepomůže). Nespoléhat na mluvenou instrukci (rozumí jen pár slovům) — používat vizuál a AAK. Neměnit náhle prostředí/režim. Nepřetěžovat hlasitými/komplexními podněty (přecitlivělost). Sebepoškozování nechápat jako zlobení.", "pripad": 18, "obor": "speciální pedagogika osob s PAS", "tema": "terapie – vyvarovat se", "zdroj": "Vágnerová STR.85–86; Thorová ⚠️"},
  {"front": "Terapie nízkofunkčního autismu — na čem PRACOVAT?", "back": "Vizualizace + AAK (piktogramy, výměnné karty) jako náhrada chybějícího porozumění řeči. Strukturované učení (TEACCH), neměnný řád a rituály. Nácvik sebeobsluhy po malých krocích. Materiální/strukturovaná odměna místo pochvaly. Všestranná podpora rodiny.", "pripad": 18, "obor": "speciální pedagogika osob s PAS", "tema": "terapie – pracovat na", "zdroj": "Vágnerová STR.85–87; Thorová ⚠️"},
  {"front": "Případ 18: s kým / čím propojit (organizace, odborníci v ČR)?", "back": "NAUTIS (dříve APLA) — diagnostika, strukturované učení, AAK. SPC pro PAS — IVP, speciální vzdělávání. Foniatr/audiolog — vyloučit periferní vadu sluchu (dif. dg.). Klinický logoped — AAK. Sociální odbor / příspěvek na péči.", "pripad": 18, "obor": "organizace", "tema": "propojení", "zdroj": "bibliografie.md ⚠️ ověřit aktuálnost"},
  {"front": "Co je mentální retardace a kde je „hranice defektivity\"?", "back": "Souhrnné označení VROZENÉHO defektu rozumových schopností (méně než 70 % normy), trvalého. Příčinou je porucha CNS. Hranice mentální defektivity = IQ 70 (průměr = IQ 100). V populaci ~3 %.", "pripad": 19, "obor": "psychopedie", "tema": "definice", "zdroj": "Vágnerová kap.10, STR.77, 78"},
  {"front": "Lehká mentální retardace (F70) — úroveň myšlení, řeči a učení?", "back": "IQ 50–69. Myšlení na úrovni dětí STŘEDNÍHO ŠKOLNÍHO VĚKU — respektuje některá pravidla logiky, ale NEUVAŽUJE abstraktně (chybí abstraktní pojmy, jen konkrétní označení). JE schopen se učit, zvládne výuku ve zvláštní/pomocné škole (ZŠ speciální/praktická).", "pripad": 19, "obor": "psychopedie", "tema": "stupeň F70", "zdroj": "Vágnerová STR.78"},
  {"front": "ZKUŠEBNÍ PAST: případ 19 (F70) vs případ 22 (F71) — jaký je rozdíl?", "back": "Medailonek je skoro identický (muž 34 let, vada řeči, ZŠ speciální, šikanován, potíže v kontaktu). JEDINÝ rozdíl: 19 = LEHKÁ MR (F70, IQ 50–69, myšlení ≈ školák, respektuje logiku); 22 = STŘEDNĚ TĚŽKÁ MR (F71, IQ 35–49, myšlení ≈ předškolák) + navíc AGRESIVITA/SEBEPOŠKOZOVÁNÍ. Případ 19 agresivitu v zadání NEMÁ.", "pripad": 19, "obor": "psychopedie", "tema": "diferenciace stupňů", "zdroj": "Vágnerová STR.78, 82–83"},
  {"front": "Případ 19: jak vyložit šikanu a „potíže v navazování kontaktu s okolím\"?", "back": "Šikana = násilně ponižující chování vůči slabšímu; slabost oběti agresi posiluje. NENÍ příčinou MR — je to SOCIÁLNÍ DŮSLEDEK → snížené sebevědomí, nedůvěra, strach → potíže v kontaktu. Řešení: obnova důvěry, nácvik sociálních dovedností, netlačit do kontaktu silou.", "pripad": 19, "obor": "psychopedie", "tema": "kontext případu", "zdroj": "Vágnerová STR.81, 155"},
  {"front": "Hlavní příčiny vzniku mentální retardace?", "back": "1) Dědičné (Downův sy = trizomie 21; polygenní). 2) Teratogenní prenatální (záření, alkohol, léky, virus zarděnek). 3) Perinatální (asfyxie, krvácení do mozku). 4) Postnatální do 18 měsíců (později = získané). POZOR: pseudooligofrenie (ze zanedbanosti, bez narušení CNS) NENÍ MR.", "pripad": 19, "obor": "psychopedie", "tema": "etiologie", "zdroj": "Vágnerová STR.78"},
  {"front": "Mentální retardace × demence × pseudooligofrenie?", "back": "MR = VROZENÝ defekt rozumu od počátku vývoje, trvalý, CNS narušena. Demence = ZÍSKANÝ úbytek dříve normálního rozumu (zhoršuje se). Pseudooligofrenie = ze zanedbanosti, CNS bez narušení, zlepšitelná v lepším prostředí (NENÍ MR).", "pripad": 19, "obor": "psychopedie", "tema": "diferenciace", "zdroj": "Vágnerová STR.77, 78"},
  {"front": "Případ 19 (lehká MR + šikana) — čeho se VYVAROVAT?", "back": "Nepřetěžovat abstrakcí (F70 chápe konkrétní logiku, ne abstraktní pojmy). Nepoužívat ironii/metafory/složité instrukce. Nebagatelizovat následky šikany — netlačit do kontaktu silou, budovat důvěru postupně. Nezneužít sugestibilitu (chránit před manipulací). Nenechat dospělého bez vedení.", "pripad": 19, "obor": "psychopedie", "tema": "terapie – vyvarovat se", "zdroj": "Vágnerová STR.78, 80, 81, 155"},
  {"front": "Případ 19 (lehká MR + šikana) — na čem PRACOVAT?", "back": "Klidné, srozumitelné, BEZPEČNÉ prostředí + pravidelný režim. Obnova důvěry a sebevědomí po šikaně (pozitivní zkušenosti, nácvik sociálních dovedností). Pracovní začlenění přiměřené F70 (zvládne jednoduchou práci) — podporované zaměstnávání. Pozitivní hodnocení/pochvala. Logopedie na vadu řeči.", "pripad": 19, "obor": "psychopedie", "tema": "terapie – pracovat na", "zdroj": "Vágnerová STR.79, 81, 82–83, 155"},
  {"front": "Případ 19: s kým / čím propojit (organizace, odborníci v ČR)?", "back": "SPC (diagnostika, poradenství), klinický logoped (vada řeči), psycholog/psychoterapie (následky šikany, sociální dovednosti), podporované zaměstnávání / chráněné dílny, SPMP ČR, sociální odbor (příspěvek na péči).", "pripad": 19, "obor": "organizace", "tema": "propojení", "zdroj": "bibliografie.md ⚠️ ověřit aktuálnost"},
  {"front": "Co je demence a v čem je klíčový rozdíl oproti mentální retardaci?", "back": "Demence = syndrom úbytku komplexu kognitivních funkcí (hlavně inteligence a paměti) — ZTRÁTA již rozvinutých funkcí, ZÍSKANÉ postižení na organickém podkladě CNS, progredující. MR je naopak VROZENÁ od počátku vývoje. ('Stařecká demence' = laický pojem pro demenci ve stáří, nejčastěji Alzheimerova/smíšená.)", "pripad": 20, "obor": "gerontopedie", "tema": "definice + diferenciace", "zdroj": "Vágnerová kap.9, STR.72–73"},
  {"front": "Co jsou BPSD (behaviorální a psychologické symptomy demence)?", "back": "Emoční a behaviorální projevy demence vedle kognitivních: poruchy emotivity (labilita, dráždivost), afektivní výbuchy, agitovanost, negativismus, apaticko-abulický syndrom; ztráta empatie, bezohlednost, egocentrismus → ztěžují soužití. Poruchy emotivity jsou STABILNÍM a typickým příznakem demencí.", "pripad": 20, "obor": "gerontopedie", "tema": "BPSD / projevy", "zdroj": "Vágnerová STR.73–74; Pidrman ⚠️"},
  {"front": "Případ 20: proč odmítá fyzioterapii a jakoukoliv činnost?", "back": "Jde o APATICKO-ABULICKÝ SYNDROM — zúžení až ztráta motivace, iniciativy a zájmu o cokoli. Je to PŘÍZNAK NEMOCI (organický podklad), NE lenost ani naschvál. Reakce: nabízet drobnou činnost po malých krocích bez nátlaku, navázat na chvíle ochoty.", "pripad": 20, "obor": "gerontopedie", "tema": "kontext případu", "zdroj": "Vágnerová STR.73"},
  {"front": "Případ 20: proč vyvolává konflikty se spolubydlícími?", "back": "Demence vede ke ztrátě empatie, k bezohlednosti, egocentrismu, dráždivosti a negativismu — nemocní přestávají respektovat běžné normy chování. Je to BPSD, ne 'zlá povaha'. Reakce: nekonfrontovat, neargumentovat logikou, validovat, předcházet spouštěčům a oddělit od dráždivých situací.", "pripad": 20, "obor": "gerontopedie", "tema": "kontext případu", "zdroj": "Vágnerová STR.73–74, 76"},
  {"front": "Případ 20: jak do rozboru zahrnout zármutek a izolaci?", "back": "Čerstvé ovdovění (úmrtí manžela) = akutní psychická zátěž, která prohlubuje apatii, depresi i dráždivost. Sociální izolace (synové na návštěvě jen 2× ročně) odebírá podpůrný kontakt, který demenci zmírňuje. PSYCHO a SOCIÁL jsou zde silné modifikátory průběhu — patří do analýzy.", "pripad": 20, "obor": "gerontopedie", "tema": "etiologie / kontext", "zdroj": "Vágnerová STR.74–76"},
  {"front": "Hlavní příčina (etiologie) demence — bio/psycho/sociál?", "back": "BIO = hlavní: organické poškození CNS (neurodegenerace u Alzheimera — nejčastější; nebo cévní poškození). PSYCHO a SOCIÁL = modifikátory (u případu 20 silné: zármutek po ovdovění, izolace). SPIRITUÁL ⚠️ = jen rozměr důstojnosti, doprovázení a péče, NE etiologie.", "pripad": 20, "obor": "gerontopedie", "tema": "etiologie", "zdroj": "Vágnerová STR.72–74"},
  {"front": "Demence s BPSD — čeho se VYVAROVAT?", "back": "Neargumentovat logikou a nevyvracet realitu (nemocný nechápe → výbuch). Nekonfrontovat a netlačit do činnosti silou. Nepřičítat vinu za konflikty ('dělá to schválně'). Nepodporovat únik rodiny ('nemá to smysl') — prohlubuje izolaci. Nepřehlížet čerstvý zármutek.", "pripad": 20, "obor": "gerontopedie", "tema": "terapie – vyvarovat se", "zdroj": "Vágnerová STR.74, 76"},
  {"front": "Demence s BPSD — na čem PRACOVAT?", "back": "VALIDACE (přijmout prožívání, neopravovat realitu, klidný tón). Stabilní známý režim a předvídatelnost. Drobná dobrovolná aktivizace po malých krocích (bez nátlaku) proti apatii. Mírnit konflikty předcházením spouštěčů. Podpora kontaktu s rodinou a se známými (návštěvy působí podpůrně).", "pripad": 20, "obor": "gerontopedie", "tema": "terapie – pracovat na", "zdroj": "Vágnerová STR.74–76; Pidrman/Jirák ⚠️"},
  {"front": "Případ 20: s kým / čím propojit (organizace, odborníci v ČR)?", "back": "Domov pro osoby se ZP / domov se zvláštním režimem, psychiatr/geriatr (zvládání BPSD, případná medikace), fyzioterapeut (citlivě, bez nátlaku), Česká alzheimerovská společnost (ČALS), sociální pracovník/rodina (řešit izolaci, podpořit návštěvy synů; příspěvek na péči). ⚠️ ověřit aktuálnost.", "pripad": 20, "obor": "organizace", "tema": "propojení", "zdroj": "bibliografie.md ⚠️ ověřit"},
  {"front": "Co je atypický autismus a čím se liší od dětského autismu?", "back": "Pervazivní vývojová porucha (PAS, F84.1), která NESPLŇUJE PLNĚ kritéria dětského autismu — buď nastupuje později, nebo je triáda neúplná (chybí příznaky v jedné oblasti). Vývoj je odlišný od počátku života jako u ostatních PAS.", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "definice", "zdroj": "Vágnerová kap.11, STR.84; Thorová ⚠️"},
  {"front": "Atypický autismus v rámci spektra PAS — kde leží?", "back": "F84.1 — neúplná/atypická kritéria. Dětský autismus (F84.0) = plná triáda od raného věku. Aspergerův sy (F84.5) = intelekt i řeč v normě. Hellerův sy (F84.3) = regres po normálním vývoji do 2 let. U tohoto muže komorbidita s MR.", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "typ PAS", "zdroj": "Vágnerová STR.87; Thorová ⚠️"},
  {"front": "Triáda PAS u atypického autismu — jak vypadá?", "back": "Triáda = sociální interakce + komunikace + stereotypní chování. U atypického autismu je triáda NEÚPLNÁ nebo se projevila atypicky/později. Přítomna porucha socializace, omezená komunikace a potřeba neměnnosti (rituály).", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "projevy / triáda", "zdroj": "Vágnerová STR.84–86; Thorová ⚠️"},
  {"front": "Jaké jsou příčiny PAS (a jaký mýtus vyvrátit)?", "back": "Vrozená neurovývojová porucha — ORGANICKÉ postižení mozku, převážně GENETICKÉ předurčení; faktory prostředí nehrají podstatnou roli. Autismus je vrozený i u dospělého. POZOR: teorie „chladné matky\" (Bettelheim) je VYVRÁCENÝ mýtus!", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "etiologie", "zdroj": "Vágnerová STR.84"},
  {"front": "Případ 21: jak v dospělosti odlišit reakci na ztrátu od demence?", "back": "Autismus (i atypický) je VROZENÝ, trvá celý život — mění se životní situace (smrt rodičů a sourozence, nástup do ÚSP), NE podstata poruchy. Afekt/regres po ztrátě = reakce na ztrátu a změnu, nezaměnit za demenci (získaný úbytek rozumu) ani psychózu.", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "diferenciace", "zdroj": "Vágnerová STR.84, 87; kap.9"},
  {"front": "Co o dospělých s autismem a ústavní péči říká Vágnerová?", "back": "I v dospělosti bývá sociální zařazení obtížné: potřebují chráněné bydlení a zaměstnání, často proto končí v ústavním zařízení. Jakákoli zvládnutelná pracovní činnost uchovává kompetence a dává životu náplň. (Odpovídá umístění do ÚSP.)", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "kontext případu", "zdroj": "Vágnerová STR.84, 87"},
  {"front": "Terapie/péče u dospělého s atypickým autismem — čeho se VYVAROVAT?", "back": "Nezahltit změnami (náhlý přesun, nové osoby a režim jsou pro PAS extrémně zátěžové). Nepodceňovat truchlení a zmatek ze ztráty; afekt/regres nechápat jako zlobení. Nezaměnit reakci na ztrátu za demenci. Neměnit zbytečně pečující osoby. Nemotivovat sociální pochvalou.", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "terapie – vyvarovat se", "zdroj": "Vágnerová STR.85–86; kap.9"},
  {"front": "Terapie/péče u dospělého s atypickým autismem — na čem PRACOVAT?", "back": "Stabilní, předvídatelné prostředí v ÚSP, jasná struktura dne a rituály. Citlivá adaptace na ztrátu (postupné zvykání, vizuální podpora, doprovázení). Zachování soběstačnosti a pracovní náplň. Vizualizace a strukturované učení pro dospělého. Sociální/právní zajištění (opatrovnictví, příspěvek na péči).", "pripad": 21, "obor": "speciální pedagogika osob s PAS", "tema": "terapie – pracovat na", "zdroj": "Vágnerová STR.84, 86–87; Thorová ⚠️"},
  {"front": "Případ 21: s kým / čím propojit (organizace, odborníci v ČR)?", "back": "ÚSP / domov pro osoby se ZP (už využívá) — pobytová služba, stálý režim. NAUTIS (dříve APLA) — metodická podpora péče o dospělé s PAS. Psychiatr/psycholog (zvládání ztráty). Sociální pracovník/opatrovník (opatrovnictví, příspěvek na péči). Chráněné dílny (pracovní náplň).", "pripad": 21, "obor": "organizace", "tema": "propojení", "zdroj": "bibliografie.md ⚠️ ověřit aktuálnost"},
  {"front": "Co je mentální retardace a kde je „hranice defektivity\"?", "back": "Souhrnné označení VROZENÉHO defektu rozumových schopností (méně než 70 % normy), trvalého. Příčinou je porucha CNS. Hranice mentální defektivity = IQ 70 (průměr = IQ 100). V populaci ~3 %.", "pripad": 22, "obor": "psychopedie", "tema": "definice", "zdroj": "Vágnerová kap.10, STR.77, 78"},
  {"front": "Středně těžká MR (F71) — úroveň myšlení, řeči a učení?", "back": "IQ 35–49. Myšlení ≈ PŘEDŠKOLNÍ dítě. Řeč chudá, agramatická, špatně artikulovaná; chybí i méně běžné konkrétní pojmy. Učí se JEN MECHANICKY na praktické úrovni. Zvládne běžné návyky a jednoduché dovednosti (sebeobsluha, pracovní úkony).", "pripad": 22, "obor": "psychopedie", "tema": "stupeň F71", "zdroj": "Vágnerová STR.78"},
  {"front": "ZKUŠEBNÍ PAST: případ 22 (F71) vs případ 19 (F70) — dva rozdíly?", "back": "Medailonek skoro identický (muž 34 let, vada řeči, ZŠ speciální, šikanován, potíže v kontaktu). ROZDÍLY: 1) stupeň — 22 = STŘEDNĚ TĚŽKÁ (F71, IQ 35–49, myšlení ≈ předškolák), 19 = LEHKÁ (F70, IQ 50–69, myšlení ≈ školák). 2) Případ 22 má NAVÍC agresivitu/sebepoškozování; případ 19 ji nemá.", "pripad": 22, "obor": "psychopedie", "tema": "diferenciace stupňů", "zdroj": "Vágnerová STR.78, 82–83"},
  {"front": "Případ 22: jak vyložit agresivitu a sebepoškozování?", "back": "NENÍ to „zlobení\". Agrese se v rané dospělosti zvyšuje jako reakce na stresující prostředí (odmítání, omezování, které nechápe) NEBO z biologických faktorů (dráždivost u organického poškození). Sebepoškozování = autostimulace / mechanismus uvolňující napětí z přetěžování, případně neverbální KOMUNIKACE potřeb. Řešit úpravou zátěže a podnětů, ne trestem.", "pripad": 22, "obor": "psychopedie", "tema": "kontext případu", "zdroj": "Vágnerová STR.82, 83"},
  {"front": "Případ 22: jak vyložit šikanu a potíže v kontaktu?", "back": "Šikana = násilně ponižující chování vůči slabšímu (MR + vada řeči = snadný terč). NENÍ příčinou MR — je to sociální důsledek → snížené sebevědomí, nedůvěra, potíže v navazování kontaktu. Problémové chování bývá u závažněji postižených způsobem neverbální komunikace.", "pripad": 22, "obor": "psychopedie", "tema": "diferenciace", "zdroj": "Vágnerová STR.83, 155"},
  {"front": "Hlavní příčiny vzniku mentální retardace?", "back": "1) Dědičné (Downův sy = trizomie 21; polygenní). 2) Teratogenní prenatální (záření, alkohol, léky, virus zarděnek). 3) Perinatální (asfyxie, krvácení do mozku). 4) Postnatální do 18 měsíců (později = získané). POZOR: pseudooligofrenie (ze zanedbanosti, bez narušení CNS) NENÍ MR.", "pripad": 22, "obor": "psychopedie", "tema": "etiologie", "zdroj": "Vágnerová STR.78"},
  {"front": "Případ 22 (středně těžká MR + agrese) — čeho se VYVAROVAT?", "back": "Nepřetěžovat (nesrozumitelné nároky spouští afekty a sebepoškozování). NEREAGOVAT na agresi/sebepoškozování TRESTEM — je to obrana/komunikace, trest jen zvyšuje napětí. Nevyžadovat abstrakci, rychlé reakce, časté změny. Nepoužívat ironii/metafory. Neměnit zbytečně prostředí a pečující osoby; nebagatelizovat šikanu.", "pripad": 22, "obor": "psychopedie", "tema": "terapie – vyvarovat se", "zdroj": "Vágnerová STR.80, 82, 83, 155"},
  {"front": "Případ 22 (středně těžká MR + agrese) — na čem PRACOVAT?", "back": "Klidné, stabilní, srozumitelné a BEZPEČNÉ prostředí + stereotyp a režim. Hledat a odstraňovat SPOUŠTĚČE agrese/sebepoškozování + nabídnout náhradní podnět. Citová jistota (motivátor učení). AAK — naučit sdělit potřebu místo afektu. Obnova důvěry po šikaně + pochvala. Sebeobsluha a jednoduché úkony na úrovni F71.", "pripad": 22, "obor": "psychopedie", "tema": "terapie – pracovat na", "zdroj": "Vágnerová STR.79, 81, 82–83, 155"},
  {"front": "Případ 22: s kým / čím propojit (organizace, odborníci v ČR)?", "back": "SPC (diagnostika, poradenství), klinický logoped (vada řeči + AAK), psycholog/psychiatr (spouštěče agrese, následky šikany, případně medikace afektů), denní stacionář / chráněné bydlení (struktura, bezpečí), SPMP ČR, sociální odbor (příspěvek na péči).", "pripad": 22, "obor": "organizace", "tema": "propojení", "zdroj": "bibliografie.md ⚠️ ověřit aktuálnost"},
  {"front": "Co je rozštěp páteře (spina bifida) a jaký je v případě 23 typ postižení?", "back": "Vrozená vývojová vada neúplného uzávěru neurální trubice / páteřního kanálu; různá míra postižení hybnosti dolních končetin a funkcí pánve. VROZENÉ tělesné postižení (somatopedie). U této ženy lehčí stupeň — chodí o francouzských berlích, vystudovala SŠ.", "pripad": 23, "obor": "somatopedie", "tema": "definice", "zdroj": "Vágnerová kap.8.6, STR.70; Pipeková ⚠️"},
  {"front": "Případ 23 (KLÍČOVÉ): co je skutečným jádrem problému — tíže postižení, nebo něco jiného?", "back": "NE tíže postižení! Žena chodí o berlích a vystudovala SŠ ekonomickou — objektivně by zvládla víc. Jádrem je PSYCHOSOCIÁLNÍ rozměr: nesoběstačnost a závislost na matce jsou z velké části NAUČENÉ (hyperprotektivní výchova, neuvolnění symbiotické vazby), ne nutný důsledek vady.", "pripad": 23, "obor": "somatopedie", "tema": "diferenciace (jádro případu)", "zdroj": "Vágnerová STR.58, 70"},
  {"front": "Co je hyperprotektivita a jak souvisí se závislostí (případ 23)?", "back": "Hyperprotektivita = nadměrně ochranitelský postoj rodiče a neochota uvolnit symbiotickou vazbu s dítětem. U postižených dětí je osamostatňování vždy obtížnější a rodiče přetrvávání závislosti považují za přiměřené → vzniká pasivně-receptivní postoj a naučená nesamostatnost. Závislost funguje jako zdroj jistoty a bezpečí.", "pripad": 23, "obor": "somatopedie", "tema": "etiologie (psychosociální)", "zdroj": "Vágnerová STR.58–59"},
  {"front": "Proč je u případu 23 chybou hodnotit ženu jako mentálně postiženou nebo neschopnou?", "back": "Tělesné postižení ≠ snížený intelekt. Žena vystudovala STŘEDNÍ EKONOMICKOU ŠKOLU — inteligence je zachována. Pohybově postižení mohou studovat většinu oborů a dosahovat dobrých výsledků; profesní role bývá nejdůležitější složkou identity. Tělesné ≠ mentální.", "pripad": 23, "obor": "somatopedie", "tema": "diferenciace (tělesné × mentální)", "zdroj": "Vágnerová STR.70"},
  {"front": "VROZENÉ × získané u případu 23 (rozštěp × úraz)?", "back": "Rozštěp páteře je VROZENÉ postižení — žena je na něj zvyklá od dětství, není subjektivně tak traumatizující jako úraz, zato více formuje vývoj. Riziko vrozeně postižených: nedostatečné osamostatnění a fixace závislosti. Kontrast: získaná paraplegie (případ 14) = náhlá ztráta, větší trauma, ale zachované kompetence.", "pripad": 23, "obor": "somatopedie", "tema": "etiologie – vrozené × získané", "zdroj": "Vágnerová STR.57–59"},
  {"front": "Terapie (případ 23) — čeho se VYVAROVAT?", "back": "Nepřičítat nesoběstačnost jen postižení (z velké části je naučená). Nepodporovat hyperprotektivitu matky a setrvávání symbiotické vazby. Nepodceňovat intelekt a kompetence. Neřešit za ni vše „pro jistotu“ (upevňuje pasivitu). Nezanedbat vrstevnické a partnerské vztahy mimo matku.", "pripad": 23, "obor": "somatopedie", "tema": "terapie – vyvarovat se", "zdroj": "Vágnerová STR.58–59, 70"},
  {"front": "Terapie (případ 23) — na čem PRACOVAT?", "back": "Postupné osamostatňování (nácvik soběstačnosti, podporované bydlení, vlastní rozhodování). Pracovní uplatnění s využitím SŠ ekonomické. Práce s matkou — uvolnění symbiotické vazby, přenesení péče na služby. Posílení sebedůvěry a motivace k autonomii (chybí motivace, ne schopnosti). Rozšíření sociálních vztahů mimo domácnost.", "pripad": 23, "obor": "somatopedie", "tema": "terapie – pracovat na", "zdroj": "Vágnerová STR.58–59, 62, 70"},
  {"front": "Případ 23: jak vyložit chůzi o berlích, SŠ a soužití s matkou po rozvodu rodičů?", "back": "Berle = zachovaná částečná lokomoce (tělesný stav umožňuje vyšší samostatnost, než žena uplatňuje). SŠ = zachovaný intelekt a kompetence. Po rozvodu je matka jediné zázemí → silná symbiotická vazba, která nahrazuje partnerství a brání dospělé roli. Cíl: přenést jistotu z matky na vlastní kompetence a služby.", "pripad": 23, "obor": "somatopedie", "tema": "kontext případu", "zdroj": "Vágnerová STR.58, 62, 70"},
  {"front": "Případ 23: s kým / čím propojit (organizace, odborníci v ČR)?", "back": "Liga vozíčkářů (poradenství, samostatný život, zaměstnávání). Sociální rehabilitace / podporované bydlení a zaměstnávání (nácvik samostatnosti, práce). Psycholog / rodinný terapeut (závislost, hyperprotektivní vazba). Fyzioterapeut (hybnost, berle). Sociální odbor / příspěvek na péči (nastavit tak, aby podporoval samostatnost).", "pripad": 23, "obor": "organizace", "tema": "propojení", "zdroj": "bibliografie.md ⚠️ ověřit aktuálnost"}
];

const el = id => document.getElementById(id);
let view = CARDS.slice();   // aktuální (filtrovaná/zamíchaná) sada
let idx = 0;

// naplnit filtry
(function initFilters(){
  const cases = [...new Set(CARDS.map(c=>c.pripad))].sort((a,b)=>a-b);
  cases.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent='Případ '+n;el('fCase').appendChild(o);});
  const obory = [...new Set(CARDS.map(c=>c.obor))].sort();
  obory.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;el('fObor').appendChild(o);});
})();

function applyFilter(){
  const fc = el('fCase').value, fo = el('fObor').value;
  view = CARDS.filter(c => (fc==='all'||String(c.pripad)===fc) && (fo==='all'||c.obor===fo));
  idx = 0; render();
}
function render(){
  const card = el('card');
  card.classList.remove('flipped');
  if(view.length===0){
    el('frontText').textContent='Žádné karty pro tento filtr.';
    el('backText').textContent=''; el('frontTags').innerHTML=''; el('backTags').innerHTML='';
    el('backSrc').innerHTML=''; el('counter').textContent='0 / 0'; return;
  }
  const c = view[idx];
  const tags = `<span class="tag case">Případ ${c.pripad}</span><span class="tag obor">${c.obor}</span><span class="tag">${c.tema}</span>`;
  el('frontTags').innerHTML = tags;
  el('backTags').innerHTML = tags;
  el('frontText').textContent = c.front;
  el('backText').textContent = c.back;
  el('backSrc').innerHTML = 'Zdroj: <b>'+c.zdroj+'</b>';
  el('counter').textContent = (idx+1)+' / '+view.length;
}
function flip(){ if(view.length) el('card').classList.toggle('flipped'); }
function next(){ if(!view.length)return; idx=(idx+1)%view.length; render(); }
function prev(){ if(!view.length)return; idx=(idx-1+view.length)%view.length; render(); }
function shuffle(){ for(let i=view.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[view[i],view[j]]=[view[j],view[i]];} idx=0; render(); }

el('card').addEventListener('click', flip);
el('flip').addEventListener('click', e=>{e.stopPropagation();flip();});
el('next').addEventListener('click', next);
el('prev').addEventListener('click', prev);
el('shuffle').addEventListener('click', shuffle);
el('reset').addEventListener('click', applyFilter);
el('fCase').addEventListener('change', applyFilter);
el('fObor').addEventListener('change', applyFilter);
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') next();
  else if(e.key==='ArrowLeft') prev();
  else if(e.key===' '){e.preventDefault();flip();}
});
render();
</script>
